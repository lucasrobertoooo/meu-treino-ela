/* ============ VOLUME SEMANAL (últimos 7 dias) ============ */
function weeklyVolume(){
  const out={};
  for(const mg of Object.keys(MG_LABELS)) out[mg]=0;
  const t=today();
  // 1) Programa ABCD (logs)
  for(const id of Object.keys(ST.logs)){
    const [day,idx]=id.split("_");
    const ex=WK[day]?.ex[+idx]; if(!ex||!ex.mg) continue;
    for(const sess of ST.logs[id]){
      const dd = daysBetween(sess.date, t);
      if(dd<0 || dd>=7) continue;
      const doneCount = validDoneCount(sess.sets);
      if(!doneCount) continue;
      for(const [mg,w] of Object.entries(ex.mg)){
        out[mg] = (out[mg]||0) + doneCount * w;
      }
    }
  }
  // 2) Sessões em casa (freelog) — calistenia conta sets done mesmo sem kg
  for(const id of Object.keys(ST.freelog)){
    const parts=id.split("_");
    const exIdx=+parts.slice(-1)[0];
    const templateId=parts.slice(0,-1).join("_");
    const tmpl=HOME_SESSIONS[templateId];
    const ex=tmpl?.ex[exIdx]; if(!ex||!ex.mg) continue;
    for(const sess of (ST.freelog[id]||[])){
      const dd = daysBetween(sess.date, t);
      if(dd<0 || dd>=7) continue;
      // Set válido na casa: done + reps>0 (kg pode ser 0 pra calistenia)
      const doneCount = (sess.sets||[]).filter(s=>s&&s.done&&num(s.reps)>0).length;
      if(!doneCount) continue;
      for(const [mg,w] of Object.entries(ex.mg)){
        out[mg] = (out[mg]||0) + doneCount * w;
      }
    }
  }
  return out;
}
// Programada por semana (sem precisar marcar) — usada como referência teórica
function plannedWeeklyVolume(){
  const out={};
  for(const mg of Object.keys(MG_LABELS)) out[mg]=0;
  for(const d of Object.keys(WK)){
    for(const ex of WK[d].ex){
      if(!ex.mg) continue;
      for(const [mg,w] of Object.entries(ex.mg)){
        out[mg] = (out[mg]||0) + (ex.s||0) * w;
      }
    }
  }
  return out;
}

/* ============ STREAK, SEMANA, DELOAD ============ */
function workoutDates(){
  const set=new Set();
  for(const id of Object.keys(ST.logs)){
    for(const sess of ST.logs[id]){
      if(hasValidDone(sess.sets)) set.add(sess.date);
    }
  }
  return Array.from(set).sort();
}
// Datas com QUALQUER atividade (programa OU sessão livre). Não zera streak em dia de casa.
function activityDates(){
  const set=new Set(workoutDates());
  for(const d of freeWorkoutDates()) set.add(d);
  return Array.from(set).sort();
}
function getStreak(){ // dias consecutivos com QUALQUER atividade (ABCD ou casa). Tolera só hoje em branco.
  const dates=new Set(activityDates());
  if(!dates.size) return 0;
  let streak=0, t=today();
  // se hoje não tem atividade, começa de ontem
  if(!dates.has(t)) t = dateAdd(t,-1);
  while(dates.has(t)){ streak++; t = dateAdd(t,-1); }
  return streak;
}
function weeksTraining(){
  const ds=workoutDates(); if(!ds.length) return 0;
  return Math.floor(daysBetween(ds[0], today())/7)+1;
}
function workoutsThisWeek(){ // só ABCD conta pra meta 4/4 — pra não inflar com sessões de casa
  const t=today(); let n=0;
  for(const d of workoutDates()){
    if(daysBetween(d,t)<7) n++;
  }
  return n;
}
// Streak semanal (Hevy model): semanas consecutivas com ≥3 treinos ABCD (3 dá pra falhar 1 e ainda contar).
// Janela semanal = últimos 7 dias até cada referência. Conta pra trás em saltos de 7.
function weekStreak(){
  const ds=workoutDates(); if(!ds.length) return 0;
  // base: fim de hoje
  let cursor=today();
  let streak=0;
  // Tolera semana atual com <3 se ainda não terminou (mantém streak até a semana acabar)
  const set=new Set(ds);
  const countWeekEnding=(endDate)=>{
    let n=0;
    for(let k=0;k<7;k++){
      if(set.has(dateAdd(endDate, -k))) n++;
    }
    return n;
  };
  // Se semana corrente tem <3 mas tem ≥1, conta a semana ANTERIOR como base
  const curN=countWeekEnding(cursor);
  if(curN>=3){
    streak=1; cursor=dateAdd(cursor,-7);
  } else if(curN>=1){
    // semana corrente em andamento: olha pra anterior
    cursor=dateAdd(cursor,-7);
  } else {
    return 0;
  }
  while(countWeekEnding(cursor)>=3){
    streak++; cursor=dateAdd(cursor,-7);
  }
  return streak;
}
function needsDeload(){
  // a cada 5 semanas treinadas sem pausa
  const last=ST.meta.lastDeloadWeek||0;
  const cur=weeksTraining();
  return cur>0 && (cur-last)>=5;
}
function markDeloadDone(){ ST.meta.lastDeloadWeek = weeksTraining(); saveK('meta'); }
// Próximo treino sugerido baseado no último feito (ciclo ABCD)
function suggestedNextDay(){
  const seq=["A","B","C","D"];
  let lastDay=null, lastDate="0000-00-00";
  for(const id of Object.keys(ST.logs)){
    const day=id.split("_")[0];
    for(const sess of ST.logs[id]){
      if(hasValidDone(sess.sets) && sess.date>lastDate){
        lastDate=sess.date; lastDay=day;
      }
    }
  }
  if(!lastDay) return "A";
  const idx=seq.indexOf(lastDay);
  return seq[(idx+1)%4];
}

/* ============ HISTÓRICO DE SESSÕES (ST.session.history — ABCD, com duração) ============ */
// Duração compacta pra listas: "52min", "1h08".
function fmtDurMin(ms){
  const min=Math.round((ms||0)/60000);
  if(min<60) return min+'min';
  const h=Math.floor(min/60), m=min%60;
  return m ? `${h}h${String(m).padStart(2,'0')}` : `${h}h`;
}
// Sessões concluídas de um treino ABCD, mais recentes primeiro.
function sessionsForDay(day){
  return ST.session.history.filter(h=>h.workoutId===day)
    .slice().sort((a,b)=>(b.endAt||0)-(a.endAt||0));
}
// Quais dias ABCD tiveram sets válidos HOJE (mesmo sem ter concluído/celebrado).
function todayTrainedDays(){
  const t=today(); const set=new Set();
  for(const id of Object.keys(ST.logs)){
    const day=id.split('_')[0];
    if(!(day==='A'||day==='B'||day==='C'||day==='D')) continue;
    for(const s of ST.logs[id]){ if(s.date===t && hasValidDone(s.sets)){ set.add(day); break; } }
  }
  return Array.from(set);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function fmtKg(v){ const n=num(v); return n? (Math.round(n*10)/10).toString() : '–'; }
function fmtInt(v){ const n=parseInt(v); return isFinite(n)?String(n):'–'; }
// Helper: set é "válido feito" se done + kg + reps preenchidos
function isValidDone(s){ return !!(s && s.done && num(s.kg)>0 && num(s.reps)>0); }
function validDoneCount(sets){ return (sets||[]).filter(isValidDone).length; }
function hasValidDone(sets){ return (sets||[]).some(isValidDone); }

function collect(id){
  const inputs=document.querySelectorAll(`input[data-id="${id}"]`);
  const map={};
  inputs.forEach(inp=>{
    const k=inp.dataset.k;
    map[k]=map[k]||{};
    map[k][inp.dataset.f]= inp.value.trim();
  });
  const tod=todaySession(id);
  const sets=Object.keys(map).sort((a,b)=>a-b).map(k=>{
    const prev=tod&&tod.sets[k]?tod.sets[k]:{};
    return {kg:map[k].kg||"", reps:map[k].reps||"", rir:map[k].rir!==undefined?map[k].rir:(prev.rir||""), done:prev.done||false};
  });
  return sets;
}
let svTimer=null;
function flashSaved(id){
  const el=document.getElementById('sv_'+id); if(!el) return;
  el.classList.add('show'); clearTimeout(svTimer);
  svTimer=setTimeout(()=>el.classList.remove('show'),1200);
}
function onLog(inp){ const id=inp.dataset.id; upsertToday(id, collect(id)); flashSaved(id); }

/* ============ Helpers: última posição planejada + Shortcut deep-link ============ */
function isLastPlannedPosition(day, exIdx, setIdx){
  const W = WK[day]; if(!W) return false;
  if(exIdx !== W.ex.length - 1) return false;
  const nset = parseInt(W.ex[exIdx].s) || 3;
  return setIdx === nset - 1;
}
function isLastHomePosition(templateId, exIdx, setIdx){
  const tmpl = HOME_SESSIONS[templateId]; if(!tmpl) return false;
  if(exIdx !== tmpl.ex.length - 1) return false;
  const nset = parseInt(tmpl.ex[exIdx].s) || 3;
  return setIdx === nset - 1;
}
function invokeExternalScheme(url){
  // iOS PWA standalone: location.href com custom scheme (shortcuts://) é
  // silenciosamente bloqueado. Um <a target="_blank"> sintético clicado
  // dentro do mesmo gesto de usuário passa pelo filtro do WebKit.
  try{
    const a = document.createElement('a');
    a.href = url;
    a.rel = 'noopener';
    a.target = '_blank';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    setTimeout(()=>{ try{ a.remove(); }catch(_){} }, 200);
    return true;
  }catch(e){}
  try{ location.href = url; return true; }catch(e){}
  return false;
}
function maybeInvokeShortcutTimer(seconds){
  if(!ST.meta || !ST.meta.shortcutTimerEnabled) return;
  const name = String(ST.meta.shortcutName||'').trim();
  if(!name) return;
  const s = Math.max(1, Math.round(seconds));
  const url = `shortcuts://run-shortcut?name=${encodeURIComponent(name)}&input=text&text=${s}`;
  invokeExternalScheme(url);
}

function toggleDone(id,k,el){
  el.classList.toggle('on');
  const sets=collect(id);
  if(sets[k]) sets[k].done=el.classList.contains('on');
  upsertToday(id,sets); flashSaved(id);
  if(!el.classList.contains('on')){
    // Desmarcou: se o timer estava rodando por causa deste set, fecha
    const ov=document.getElementById('overlay');
    if(ov && !ov.classList.contains('hidden') && tState==='running'){
      closeTimer();
    }
    return;
  }
  {
    const day=id.split('_')[0], i=+id.split('_')[1];
    // Auto-start session na primeira marcação válida do dia (não pergunta, é o caminho natural)
    if(!isSessionActive() && !alreadyCelebratedToday(day) && isValidDone(sets[k])){
      ST.session.active={workoutId:day, startAt:Date.now(), pausedAt:null, pausedTotal:0};
      saveK('session');
      updateSessionDisplays();
      updateFabMenu();
    }
    // Se sessão estava pausada, retoma sozinho ao checar set
    if(isSessionPaused()){ resumeSession(); }
    const isLast = isLastPlannedPosition(day, i, k);
    const autoFinish = !(ST.meta && ST.meta.autoCompleteOnLastCheck===false); // default true
    // Descanso: pula se for última posição planejada (final do treino)
    if(!isLast){
      // IMPORTANTE: dispara Shortcut ANTES de abrir overlay/audio/etc — iOS PWA
      // exige deep-link como primeira ação do gesto de usuário. Qualquer coisa
      // no meio (openTimer, unlockAudio, requestWakeLock) queima o gesto.
      maybeInvokeShortcutTimer(REST[WK[day].ex[i].t]);
      openTimer(REST[WK[day].ex[i].t]); startTimer();
    }
    // Detecta workout 100% completo → celebra direto (sem perguntar)
    if(isWorkoutComplete(day) && !alreadyCelebratedToday(day)){
      // pequena espera pro user ver o ✓ marcar antes do modal abrir
      setTimeout(()=>{
        if(isWorkoutComplete(day) && !alreadyCelebratedToday(day)){
          closeTimer();
          showCelebration(day);
        }
      }, 600);
    } else if(isLast && autoFinish && !alreadyCelebratedToday(day)){
      // Última posição marcada mas com sets pulados no meio → pergunta
      setTimeout(()=>{
        if(alreadyCelebratedToday(day)) return;
        if(confirm('Último set marcado. Concluir treino agora?')){
          showCelebration(day);
        }
      }, 500);
    }
  }
}

  app.innerHTML=h;

function collectHome(id){
  const inputs=document.querySelectorAll(`input[data-id="${id}"]`);
  const map={};
  inputs.forEach(inp=>{
    const k=inp.dataset.k;
    map[k]=map[k]||{};
    map[k][inp.dataset.f]= inp.value.trim();
  });
  const tod=todayFreeSession(id);
  const sets=Object.keys(map).sort((a,b)=>a-b).map(k=>{
    const prev=tod&&tod.sets[k]?tod.sets[k]:{};
    return {kg:map[k].kg||"", reps:map[k].reps||"", rir:map[k].rir!==undefined?map[k].rir:(prev.rir||""), done:prev.done||false};
  });
  return sets;
}
function onHomeLog(inp){ const id=inp.dataset.id; upsertFreeToday(id, collectHome(id)); flashSaved(id); }
function toggleHomeDone(id,k,el){
  el.classList.toggle('on');
  const sets=collectHome(id);
  if(sets[k]) sets[k].done=el.classList.contains('on');
  upsertFreeToday(id,sets); flashSaved(id);
  if(!el.classList.contains('on')){
    const ov=document.getElementById('overlay');
    if(ov && !ov.classList.contains('hidden') && tState==='running'){ closeTimer(); }
    return;
  }
  // Identifica tipo do exercício pra descanso correto
  const parts=id.split("_");
  const exIdx=+parts.slice(-1)[0];
  const templateId=parts.slice(0,-1).join("_");
  const tmpl=HOME_SESSIONS[templateId];
  const ex=tmpl?.ex[exIdx];
  if(!ex) return;
  // Pula descanso na última posição planejada (final da sessão em casa)
  if(isLastHomePosition(templateId, exIdx, k)) return;
  // Shortcut ANTES do openTimer (ver comentário em toggleDone)
  maybeInvokeShortcutTimer(REST[ex.t] ?? 75);
  openTimer(REST[ex.t] ?? 75); startTimer();
}

/* ============ Hoje helpers (input handlers) ============ */
function setBW(v){
  const t=today(); const n=num(v);
  // remove existing today
  ST.bw = ST.bw.filter(x=>x.date!==t);
  if(n>0) ST.bw.push({date:t, kg:n});
  ST.bw.sort((a,b)=>a.date<b.date?-1:1);
  saveK('bw');
}
function setSleep(v){
  const t=today(); const n=num(v);
  if(n>0) ST.sleep[t]=n; else delete ST.sleep[t];
  saveK('sleep');
}
function updateFoodResults(){
  const inp=document.getElementById('foodSearch'); if(!inp) return;
  const q=inp.value;
  const ul=document.getElementById('foodResults');
  const matches=searchFoods(q);
  if(!matches.length){
    ul.innerHTML = q.trim()?'<div class="food-empty">Sem resultado pra "'+esc(q.trim())+'"</div>':'';
    return;
  }
  ul.innerHTML = matches.map(({f,i})=>`<div class="food-item" onclick="addFood(${i})">
    <div class="fnm">${esc(f.n)} <small>${esc(f.q)}</small></div>
    <div class="fmac"><b>${f.p}</b>p<span class="sep">·</span>${f.c||0}c<span class="sep">·</span>${f.k||0}k</div>
  </div>`).join('');
}
function addFood(idx){
  const t=today();
  if(!ST.protein[t] || !Array.isArray(ST.protein[t])) ST.protein[t]=[];
  const f=FOOD_DB[idx]; if(!f) return;
  ST.protein[t].push({n:f.n, q:f.q, p:f.p, c:f.c||0, k:f.k||0});
  saveK('protein');
  const inp=document.getElementById('foodSearch');
  const savedQ = inp?inp.value:"";
  const savedY = window.scrollY;
  renderHoje();
  window.scrollTo(0, savedY);
  const inp2=document.getElementById('foodSearch');
  if(inp2){ inp2.value=savedQ; updateFoodResults(); }
}
let _lastRemovedFood=null;
function removeFoodEntry(idx){
  const t=today();
  if(!Array.isArray(ST.protein[t])) return;
  const removed=ST.protein[t][idx];
  ST.protein[t].splice(idx,1);
  if(!ST.protein[t].length) delete ST.protein[t];
  saveK('protein');
  if(removed){
    _lastRemovedFood={date:t, entry:removed, ts:Date.now()};
    showToast(`Removido: ${removed.n} · toca aqui pra desfazer`, 'info', 4000);
    // Bind clique no toast pra undo
    const tEl=document.getElementById('toast');
    if(tEl){
      tEl.onclick=()=>{
        if(_lastRemovedFood && Date.now()-_lastRemovedFood.ts<6000){
          if(!Array.isArray(ST.protein[_lastRemovedFood.date])) ST.protein[_lastRemovedFood.date]=[];
          ST.protein[_lastRemovedFood.date].push(_lastRemovedFood.entry);
          saveK('protein');
          _lastRemovedFood=null;
          renderHoje();
        }
        tEl.onclick=null;
        tEl.classList.add('hidden');
      };
    }
  }
  renderHoje();
}
let customFoodOpen=false;
function toggleCustomFood(){
  customFoodOpen=!customFoodOpen;
  const f=document.getElementById('customFoodForm');
  if(!f) return;
  f.classList.toggle('hidden', !customFoodOpen);
  // Atualiza label do botão pra refletir estado
  const btn=document.querySelector('.custom-btn');

/* ============ CORPO — peso, fotos, medidas, volume, PRs ============ */
function renderCorpo(){
  sub.textContent="Onde se mede o progresso real";
  const bws = ST.bw.slice(-30);
  const lastBW = ST.bw.length?ST.bw[ST.bw.length-1]:null;
  const firstBW = ST.bw.length?ST.bw[0]:null;
  const deltaBW = (ST.bw.length>1 && lastBW && firstBW) ? (lastBW.kg-firstBW.kg) : 0;

  let h=``;

  // STATS topo
  const wkVol = weeklyVolume();
  const totalWkSets = Object.values(wkVol).reduce((a,b)=>a+b,0);
  const wksT = weeksTraining();
  h+=`<div class="stats">
    <div class="stat"><div class="l">Semanas treinando</div><div class="v">${wksT}</div><div class="s">desde ${ST.bw[0]?.date?.slice(5)||workoutDates()[0]?.slice(5)||'agora'}</div></div>
    <div class="stat"><div class="l">Séries esta semana</div><div class="v">${Math.round(totalWkSets)}</div><div class="s">total · todos grupos</div></div>
  </div>`;

  // HISTÓRICO DE TREINOS — sessões ABCD concluídas, mais recentes primeiro (data · duração · sets · volume)
  const recentSessions = ST.session.history.slice().sort((a,b)=>(b.endAt||0)-(a.endAt||0)).slice(0,12);
  if(recentSessions.length){
    h+=`<h2 class="sec">Histórico de treinos</h2><div class="histcard">`;
    for(const r of recentSessions){
      const wk=WK[r.workoutId];
      const nm=wk?wk.name:r.workoutId;
      const vol=r.volume?(r.volume>=1000?(r.volume/1000).toFixed(1)+'t':r.volume+'kg'):'';
      h+=`<div class="hrow">
        <div class="hbadge ${wk?wk.type:''}">${r.workoutId}</div>
        <div class="hmeta">
          <div class="hnm">${esc(nm)}</div>
          <div class="hsub">${esc(r.date.slice(5).replace('-','/'))} · ${r.sets||0} sets${vol?` · ${vol}`:''}</div>
        </div>
        <div class="hdur">${fmtDurMin(r.activeMs)}</div>
      </div>`;
    }
    h+=`</div>`;
  }

  // SPARKLINE PESO
  if(bws.length>=2){
    const min=Math.min(...bws.map(b=>b.kg)), max=Math.max(...bws.map(b=>b.kg));
    const rng=Math.max(0.5, max-min);
    const w=300, hh=50;
    const pts = bws.map((b,i)=>{
      const x = (i/(bws.length-1))*w;
      const y = hh - ((b.kg-min)/rng)*hh;
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const deltaClass = deltaBW>=0?'up':'dn';
    const deltaSign = deltaBW>=0?'+':'';
    h+=`<div class="spark-card">
      <div class="hdr">
        <div><div class="l">Peso corporal</div><div class="v">${lastBW.kg}<small>kg</small></div></div>
        <div class="delta ${deltaClass}">${deltaSign}${deltaBW.toFixed(1)}kg em ${bws.length} pesagens</div>
      </div>
      <svg class="spark" viewBox="0 0 ${w} ${hh}" preserveAspectRatio="none">
        <polyline points="${pts}" fill="none" stroke="url(#sg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#5b9eff"/><stop offset="100%" stop-color="#7ab2ff"/></linearGradient></defs>
      </svg>
    </div>`;
  } else {
    h+=`<div class="spark-card"><div class="hdr"><div><div class="l">Peso corporal</div><div class="v" style="font-size:15px;color:var(--muted)">Pesa-te na aba <b style="color:var(--pull)">Hoje</b></div></div></div></div>`;
  }

  // VOLUME SEMANAL POR GRUPO
  h+=`<h2 class="sec">Volume semanal por grupo</h2>
  <div class="volcard">`;
  for(const mg of MG_ORDER){
    const v = wkVol[mg]||0;
    const tgt = MG_TARGETS[mg];
    const pct = Math.min(100, (v/tgt)*100);
    const c = MG_COLOR[mg];
    const isPrio = MG_PRIORITY[mg];
    const status = v>=tgt ? 'ok' : (v>=tgt*0.7 ? 'ok' : 'low');
    h+=`<div class="vbar2">
      <div class="vn ${isPrio?'prio':''}">${MG_LABELS[mg]}${isPrio?'<span class="star">★</span>':''}</div>
      <div class="track"><div class="fill" style="width:${pct}%;background:linear-gradient(90deg,${c}88,${c})"></div></div>
      <div class="vv"><b>${v.toFixed(v%1?1:0)}</b>/${tgt}</div>
    </div>`;
  }
  h+=`<p class="volnote">Séries duras feitas nos últimos 7 dias. Compostos contam 0.5 pros músculos secundários. <b>★ prioridade</b> · meta acima de 10-12 séries/semana.</p></div>`;

  // PRs por exercício
  const allPRs = [];
  for(const d of ["A","B","C","D"]){
    WK[d].ex.forEach((e,i)=>{
      const id=exId(d,i);
      const best=historicalBestE1RM(id, false);
      const h=ST.logs[id]||[];
      let bestSet=null, bestSetE1=0;
      for(const s of h){
        for(const set of (s.sets||[])){
          const e1=e1RM(set.kg,set.reps);
          if(e1>bestSetE1){ bestSetE1=e1; bestSet={...set, date:s.date}; }
        }
      }
      if(best>0 && e.t==='comp') allPRs.push({name:exName(e), e1:best, set:bestSet});
    });
  }
  if(allPRs.length){
    h+=`<h2 class="sec">PRs · compostos</h2><div class="volcard">`;
    allPRs.sort((a,b)=>b.e1-a.e1).forEach(pr=>{
      h+=`<div class="anchor" style="border-color:var(--line)">
        <span style="font-size:13px">${esc(pr.name)} <small style="color:var(--faint);display:block;font-size:11px;margin-top:2px">${pr.set?`${fmtKg(pr.set.kg)}kg × ${pr.set.reps} em ${pr.set.date.slice(5)}`:''}</small></span>
        <b style="color:var(--core)">${(Math.round(pr.e1*10)/10)}kg<small style="display:block;font-size:9px;color:var(--faint);font-weight:600">e1RM</small></b>
      </div>`;
    });
    h+=`</div>`;
  }

  // MEDIDAS
  const latestM = ST.measures.length? ST.measures[ST.measures.length-1] : null;
  const firstM = ST.measures.length? ST.measures[0] : null;
  h+=`<h2 class="sec">Medidas</h2>
  <div class="check-card">
    <h3><span class="ic" style="color:var(--pull)">${I.ruler}</span>Nova medida (cm)</h3>`;
  for(const [k,nm] of MEASURE_FIELDS){
    const last = latestM?latestM[k]:'';
    h+=`<div class="ilog" style="${k!=='peito'?'border-top:1px solid var(--line);padding-top:10px':''}">
      <span class="lb">${nm}</span>
      <input id="m_${k}" inputmode="decimal" placeholder="${last||'cm'}">
      <span class="u">cm</span>
    </div>`;
  }
  h+=`<div class="tools" style="margin-top:12px"><button onclick="saveMeasures()">Salvar medidas de hoje</button></div>`;
  if(latestM){
    h+=`<div style="margin-top:14px;font-size:11.5px;color:var(--muted);font-weight:600">Última (${latestM.date.slice(5)}): `;
    h+=MEASURE_FIELDS.filter(([k])=>latestM[k]).map(([k,nm])=>{
      const d=firstM&&firstM!==latestM&&firstM[k]?` <b style="color:${(latestM[k]-firstM[k])>=0?'var(--ok)':'var(--push)'}">(${(latestM[k]-firstM[k])>=0?'+':''}${(latestM[k]-firstM[k]).toFixed(1)})</b>`:'';
      return `${nm.split(' ')[0]} <b style="color:var(--ink)">${latestM[k]}cm</b>${d}`;
    }).join(' · ');
    h+=`</div>`;
  }
  h+=`</div>`;

  // FOTOS
  h+=`<h2 class="sec">Fotos · progresso</h2>
  <div class="check-card">
    <h3><span class="ic" style="color:var(--pull)">${I.camera}</span>Tire foto cada 2 semanas (mesma luz/pose)</h3>
    <label class="uploadbtn">${I.camera} Adicionar foto de hoje
      <input type="file" accept="image/*" capture="environment" onchange="addPhoto(this)">
    </label>`;
  if(ST.photos.length){
    h+=`<div class="photos-grid">`;
    ST.photos.slice().reverse().forEach((p,idx)=>{
      const realIdx = ST.photos.length-1-idx;
      h+=`<div class="pthumb">
        <img src="${p.dataUrl}" alt="${p.date}">
        <button class="px" onclick="delPhoto(${realIdx})">×</button>
        <div class="pdate">${p.date.slice(5)}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  app.innerHTML=h;
}

function saveMeasures(){
  const t=today();
  const m={date:t};
  let any=false;
  for(const [k] of MEASURE_FIELDS){
    const el=document.getElementById('m_'+k);
    if(el && el.value.trim()){ m[k]=num(el.value); any=true; }
  }
  if(!any){ showToast('Preencha pelo menos uma medida', 'warn', 2000); return; }
  ST.measures = ST.measures.filter(x=>x.date!==t);
  ST.measures.push(m);
  ST.measures.sort((a,b)=>a.date<b.date?-1:1);
  if(saveK('measures')){
    showToast('Medidas salvas ✓', 'ok', 1800);
  }
  renderCorpo();
}

function addPhoto(input){
  const f=input.files&&input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=800; const ratio=Math.min(1, maxW/img.width);
      const w=Math.round(img.width*ratio), h=Math.round(img.height*ratio);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      const ctx=c.getContext('2d'); ctx.drawImage(img,0,0,w,h);
      const dataUrl=c.toDataURL('image/jpeg', 0.78);
      ST.photos.push({date:today(), dataUrl});
      if(!saveK('photos')){
        ST.photos.pop(); // rollback
        alert('Sem espaço! Apague fotos antigas (toque no ×) e tente de novo.');
        return;
      }
      renderCorpo();
    };
    img.src=r.result;
  };
  r.readAsDataURL(f);
}
function delPhoto(idx){
  if(!confirm('Apagar essa foto?')) return;
  ST.photos.splice(idx,1); saveK('photos'); renderCorpo();
}

  const t=document.getElementById('exp'); t.classList.remove('hidden');
  const full={_v:1, _at:new Date().toISOString()};
  for(const k of Object.keys(LS)) full[k]=ST[k];
  const json=JSON.stringify(full);
  t.value=json; t.select();
  // Marca data do backup pra evitar nag até 7d
  if(!ST.meta) ST.meta={};
  ST.meta.lastBackupAt=Date.now();
  saveK('meta');
  // Tenta clipboard + share automático (iOS share sheet)
  let copied=false;
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(json);
      copied=true;
    }
  }catch(e){}
  if(copied){
    showToast('Backup copiado pra área de transferência ✓', 'ok', 2500);
  }
  // Oferece share sheet (cole no Notes, Mail, Files, etc.)
  try{
    if(navigator.share){
      const filename=`meutreino-backup-${new Date().toISOString().slice(0,10)}.json`;
      const file=new File([json], filename, {type:'application/json'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:'MeuTreino Backup'});
      } else {
        await navigator.share({title:'MeuTreino Backup', text:json});
      }
    }
  }catch(e){ /* share cancel ou unsupported, segue */ }
  if(!copied) showToast('Backup gerado abaixo — copie pra um lugar seguro', 'info', 3000);
}
function importData(){
  const v=document.getElementById('imp').value.trim(); if(!v) return;
  try{
    const o=JSON.parse(v);
    // Reset ST inteiro pro default antes de aplicar (evita Frankenstein)
    if(o.logs!==undefined){
      for(const k of Object.keys(LS)){
        ST[k] = (o[k]!==undefined) ? o[k] : JSON.parse(JSON.stringify(DEFAULTS[k]));
        saveK(k);
      }
    } else {
      // backup MUITO antigo: só logs em raiz
      for(const k of Object.keys(LS)){
        ST[k] = JSON.parse(JSON.stringify(DEFAULTS[k]));
      }
      ST.logs=o; saveK('logs');
    }
    // re-roda migração de protein
    for(const date in ST.protein){
      if(!Array.isArray(ST.protein[date])) ST.protein[date]=[];
    }
    alert('Backup importado.'); render();
  } catch(e){ alert('Backup inválido: '+e.message); }
}
document.addEventListener('input',e=>{
  if(e.target.id==='imp'){ document.getElementById('impbtn').classList.remove('hidden'); }
});
function resetData(){
  if(confirm('Apagar TODOS os registros deste app (treinos, peso, sono, fotos)?')){
    for(const k of Object.keys(LS)){ ST[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); saveK(k); }
    render();
  }
}
function clearTodayData(){
  if(!confirm('Apagar SETS, sessão ativa e celebração de HOJE (mantém peso/sono/macros/cardio de hoje + todos os outros dias)?')) return;
  const t=todayISO();
  // 1. Remove sets de hoje de todos os exercícios
  let removedLogs=0;
  for(const id in ST.logs){
    if(Array.isArray(ST.logs[id])){
      const before=ST.logs[id].length;
      ST.logs[id]=ST.logs[id].filter(s=>s.date!==t);
      removedLogs += before - ST.logs[id].length;
      if(!ST.logs[id].length) delete ST.logs[id];
    }
  }
  saveK('logs');
  // 2. Remove celebrações de hoje
  if(ST.session && Array.isArray(ST.session.history)){
    ST.session.history = ST.session.history.filter(h=>h.date!==t);
  }
  // 3. Limpa sessão ativa
  if(ST.session) ST.session.active = null;
  saveK('session');
  // 4. Cancela push agendado se tinha algo no ar
  cancelRemotePushes();
  showToast(`Dia limpo — ${removedLogs} sets removidos`,'ok',2500);
  render();
}

/* ============ TIMER (state machine: idle | running | paused | done) ============ */
let tTotal=90, tLeft=90, tRun=false, tInt=null, aCtx=null, wakeLock=null;
let tState='idle', tEndAt=0, autoCloseTO=null, tMinimized=false;
const CIRC=2*Math.PI*96;

function minimizeTimer(){
  // Só faz sentido se há timer rodando ou em done
  if(tState==='idle') return;
  tMinimized=true;
  const ov=document.getElementById('overlay');
  if(ov) ov.classList.add('hidden');
  const mt=document.getElementById('miniTimer');
  if(mt){
    mt.classList.remove('hidden');
    mt.setAttribute('data-state', tState==='done' ? 'done' : 'running');
  }
  updateMiniTimer();
}
function expandTimer(){
  tMinimized=false;
  const mt=document.getElementById('miniTimer');
  if(mt){ mt.classList.add('hidden'); mt.removeAttribute('data-state'); }
  const ov=document.getElementById('overlay');
  if(ov) ov.classList.remove('hidden');
  paint();
}
function updateMiniTimer(){
  if(!tMinimized) return;
  const v=document.getElementById('miniTimerVal');
  if(v){
    v.textContent = tState==='done' ? '✓ pronto' : fmt(tLeft);
  }
  const mt=document.getElementById('miniTimer');
  if(mt){
    mt.setAttribute('data-state', tState==='done' ? 'done' : 'running');
  }
}

// Unlock audio context na primeira interação (essencial pro iOS)
function unlockAudio(){
  try{
    if(!aCtx) aCtx=new (window.AudioContext||window.webkitAudioContext)();
    if(aCtx.state==='suspended') aCtx.resume();
  }catch(e){}
}
document.addEventListener('touchstart', unlockAudio, {passive:true});
document.addEventListener('click', unlockAudio, {passive:true});

function fmt(s){ return Math.floor(s/60)+":"+String(Math.floor(s%60)).padStart(2,'0'); }
function paint(){
  const tv=document.getElementById('tval'); if(tv) tv.textContent=fmt(tLeft);
  const rf=document.getElementById('ringfill');
  if(rf){ const off=CIRC*(1-tLeft/tTotal); rf.style.strokeDashoffset=off; }
  if(tMinimized) updateMiniTimer();
}
function clearTimerStateOnly(){
  if(tInt){ clearInterval(tInt); tInt=null; }
  if(autoCloseTO){ clearTimeout(autoCloseTO); autoCloseTO=null; }
  tRun=false; tEndAt=0;
}
function setTimer(s){
  clearTimerStateOnly();
  tState='idle';
  const ov=document.getElementById('overlay'); if(ov) ov.removeAttribute('data-state');
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Iniciar'; ppb.removeAttribute('data-state'); }
  tTotal=s; tLeft=s;
  const rf=document.getElementById('ringfill'); if(rf) rf.setAttribute('stroke-dasharray',CIRC);
  document.querySelectorAll('.preset').forEach(b=>b.classList.toggle('active', +b.dataset.s===s));
  paint();
}
function openTimer(s){
  if(typeof s==='number') setTimer(s); else setTimer(tTotal);
  document.getElementById('overlay').classList.remove('hidden');
  updateShortcutLink(typeof s==='number' ? s : tTotal);
  paint();
}
function updateShortcutLink(seconds){
  const link = document.getElementById('shortcutLink');
  if(!link) return;
  // Basta ter o nome do Atalho configurado — toggle controla só o disparo automático.
  // O botão manual funciona sempre que o nome estiver setado.
  const name = ST.meta && String(ST.meta.shortcutName||'').trim();
  if(!name){ link.classList.add('hidden'); return; }
  const s = Math.max(1, Math.round(seconds||0));
  link.href = `shortcuts://run-shortcut?name=${encodeURIComponent(name)}&input=text&text=${s}`;
  link.classList.remove('hidden');
}
function markShortcutInvoked(){
  // Chamado quando user toca no link manual — só pra feedback visual
  showToast('Chamando Atalhos…','ok',1500);
}
function closeTimer(){
  // Se timer estava rodando, cancela push agendado (evita disparar depois do user fechar)
  if(tState==='running') cancelRemotePushes();
  clearTimerStateOnly();
  tState='idle';
  tMinimized=false;
  releaseWakeLock();
  const ov=document.getElementById('overlay');
  if(ov){ ov.classList.add('hidden'); ov.removeAttribute('data-state'); }
  const mt=document.getElementById('miniTimer');
  if(mt){ mt.classList.add('hidden'); mt.removeAttribute('data-state'); }
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Iniciar'; ppb.removeAttribute('data-state'); }
}
function toggleTimer(){
  if(tState==='done'){ closeTimer(); return; }
  if(tRun){ pauseTimer(); } else { startTimer(); }
}
async function requestWakeLock(){
  try{
    if('wakeLock' in navigator){
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', ()=>{ wakeLock=null; });
    }
  }catch(e){}
}
function releaseWakeLock(){
  try{ if(wakeLock){ wakeLock.release(); wakeLock=null; } }catch(e){}
}
// Visibility: re-adquire wake lock + reconciliar timer ao voltar do bg
document.addEventListener('visibilitychange', ()=>{
  if(document.visibilityState!=='visible') return;
  // Reconcilia tempo (setInterval throttla em bg no iOS)
  if(tState==='running' && tEndAt>0){
    tLeft=Math.max(0,(tEndAt-Date.now())/1000);
    paint();
    if(tLeft<=0){ timerDone(); return; }
    if(!wakeLock) requestWakeLock();
  }
  // Auto-close se ficou "done" no bg por mais de 5s
  if(tState==='done' && !autoCloseTO){
    autoCloseTO=setTimeout(closeTimer, 1500);
  }
});

function startTimer(){
  if(tRun) return;
  if(tLeft<=0) tLeft=tTotal;
  tRun=true; tState='running';
  unlockAudio();
  maybeRequestNotificationPermission();
  const ppb=document.getElementById('ppbtn'); if(ppb) ppb.textContent='Pausar';
  requestWakeLock();
  tEndAt=Date.now()+tLeft*1000;
  // Nota: maybeInvokeShortcutTimer é disparado ANTES de openTimer/startTimer,
  // direto de toggleDone/toggleHomeDone, pra preservar o user gesture no iOS.
  // Chamar aqui não funciona em PWA standalone — o gesto já foi queimado.
  // Agenda push remoto (via Worker) — funciona com app fechado/tela bloqueada
  scheduleRemotePush(tEndAt);
  tInt=setInterval(()=>{
    tLeft=Math.max(0,(tEndAt-Date.now())/1000);
    paint();
    if(tLeft<=0){ timerDone(); }
  }, 100);
}
function pauseTimer(){
  if(!tRun) return;
  tRun=false; tState='paused';
  if(tInt){ clearInterval(tInt); tInt=null; }
  tEndAt=0;
  const b=document.getElementById('ppbtn'); if(b) b.textContent='Iniciar';
  cancelRemotePushes();
}
function timerDone(){
  clearTimerStateOnly();
  tState='done';
  releaseWakeLock();
  // Se estava minimizado, expande pro user ver o estado done — feedback óbvio
  if(tMinimized){ expandTimer(); }
  const ov=document.getElementById('overlay');
  if(ov) ov.setAttribute('data-state','done');
  const ppb=document.getElementById('ppbtn');
  if(ppb){ ppb.textContent='Fechar'; ppb.setAttribute('data-state','done'); }
  playChime();
  notifyTimerDone();
  flashDone();
  autoCloseTO=setTimeout(closeTimer, 5000);
}

/* ============ Audio + Notifications ============ */
// Chime: acorde C5-E5-G5 com envelope sino. AudioContext resume agressivo.
function playChime(){
  try{
    if(!aCtx) aCtx=new (window.AudioContext||window.webkitAudioContext)();
    // resume mesmo se aparenta running (iOS às vezes mente)
    if(aCtx.state!=='running'){ aCtx.resume(); }
    const notes=[523.25,659.25,783.99];
    notes.forEach((freq,i)=>{
      const startAt=aCtx.currentTime+i*0.10;
      const o=aCtx.createOscillator(); o.type='sine'; o.frequency.value=freq;
      const o2=aCtx.createOscillator(); o2.type='sine'; o2.frequency.value=freq/2;
      const g=aCtx.createGain(); const g2=aCtx.createGain();
      o.connect(g); o2.connect(g2);
      g.connect(aCtx.destination); g2.connect(aCtx.destination);
      g.gain.setValueAtTime(0.001,startAt);
      g.gain.exponentialRampToValueAtTime(0.22,startAt+0.015);
      g.gain.exponentialRampToValueAtTime(0.001,startAt+1.4);
      g2.gain.setValueAtTime(0.001,startAt);
      g2.gain.exponentialRampToValueAtTime(0.10,startAt+0.025);
      g2.gain.exponentialRampToValueAtTime(0.001,startAt+1.6);
      o.start(startAt); o.stop(startAt+1.5);
      o2.start(startAt); o2.stop(startAt+1.7);
    });
  }catch(e){ console.warn('chime fail', e); }
  // Vibração só Android (iOS Safari ignora silenciosamente)
  try{
    if('vibrate' in navigator && /Android/.test(navigator.userAgent)){
      navigator.vibrate([120,60,120]);
    }
  }catch(e){}
}

/* ============ REMOTE PUSH via Cloudflare Worker ============ */
function urlBase64ToUint8Array(base64){
  const padding='='.repeat((4-base64.length%4)%4);
  const b64=(base64+padding).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b64);
  const out=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}
function pushConfigured(){
  return !!(ST.meta && ST.meta.workerUrl && ST.meta.workerToken);
}
async function subscribeForPush(){
  if(!pushConfigured()){ showToast('Configure o Worker em Mais primeiro','warn',2500); return null; }
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    showToast('PushManager não suportado neste browser','warn',2500); return null;
  }
  try{
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      const r=await fetch(`${ST.meta.workerUrl}/vapid-key`,{cache:'no-store'});
      if(!r.ok) throw new Error('vapid-key '+r.status);
      const {publicKey}=await r.json();
      if(!publicKey) throw new Error('publicKey ausente');
      sub=await reg.pushManager.subscribe({
        userVisibleOnly:true,
        applicationServerKey:urlBase64ToUint8Array(publicKey),
      });
    }
    const r2=await fetch(`${ST.meta.workerUrl}/subscribe`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${ST.meta.workerToken}`},
      body:JSON.stringify({subscription:sub.toJSON()}),
    });
    if(!r2.ok) throw new Error('subscribe '+r2.status);
    const {hash}=await r2.json();
    if(!ST.meta) ST.meta={};
    ST.meta.pushHash=hash;
    saveK('meta');
    showToast('Push subscrito ✓','ok',2200);
    return hash;
  }catch(e){
    console.error('subscribeForPush', e);
    showToast('Falha no subscribe: '+e.message,'warn',3500);
    return null;
  }
}
async function scheduleRemotePush(fireAt, title, body){
  if(!pushConfigured() || !ST.meta.pushHash) return;
  try{
    await fetch(`${ST.meta.workerUrl}/schedule`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${ST.meta.workerToken}`},
      body:JSON.stringify({hash:ST.meta.pushHash, fireAt, title, body}),
    });
  }catch(e){ /* silent */ }
}
async function cancelRemotePushes(){
  if(!pushConfigured() || !ST.meta.pushHash) return;
  try{
    await fetch(`${ST.meta.workerUrl}/cancel`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${ST.meta.workerToken}`},
      body:JSON.stringify({hash:ST.meta.pushHash}),
    });
  }catch(e){}
}
async function testRemotePush(){
  if(!pushConfigured()){ showToast('Configure Worker URL + Token primeiro','warn',2500); return; }
  if(!ST.meta.pushHash){
    showToast('Sem subscription — toca em "Ativar push" primeiro','warn',3000); return;
  }
  try{
    const r=await fetch(`${ST.meta.workerUrl}/test`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${ST.meta.workerToken}`},
      body:JSON.stringify({hash:ST.meta.pushHash}),
    });
    if(r.ok) showToast('Push de teste enviado — chega em ~5s','ok',2500);
    else showToast('Erro: '+r.status,'warn',3000);
  }catch(e){ showToast('Falha: '+e.message,'warn',3000); }
}
function setWorkerUrl(v){
  if(!ST.meta) ST.meta={};
  ST.meta.workerUrl=String(v||'').trim().replace(/\/$/,'');
  saveK('meta');
}
function setWorkerToken(v){
  if(!ST.meta) ST.meta={};
  ST.meta.workerToken=String(v||'').trim();
  saveK('meta');
}
function toggleShortcutTimer(){
  if(!ST.meta) ST.meta={};
  ST.meta.shortcutTimerEnabled = !ST.meta.shortcutTimerEnabled;
  if(ST.meta.shortcutTimerEnabled && !ST.meta.shortcutName){
    ST.meta.shortcutName = 'MeuTreinoTimer';
  }
  saveK('meta');
  renderMais();
  showToast(ST.meta.shortcutTimerEnabled ? 'Timer via Atalhos ligado' : 'Timer via Atalhos desligado', 'ok', 1800);
}
function setShortcutName(v){
  if(!ST.meta) ST.meta={};
  ST.meta.shortcutName = String(v||'').trim();
  saveK('meta');
}
function testShortcutTimer(){
  if(!ST.meta || !ST.meta.shortcutName){
    showToast('Configure o nome do Atalho primeiro', 'warn', 2500); return;
  }
  const name = ST.meta.shortcutName;
  const url = `shortcuts://run-shortcut?name=${encodeURIComponent(name)}&input=text&text=30`;
  const ok = invokeExternalScheme(url);

  else showToast('Falha ao chamar Atalhos','warn',3000);
}
function toggleAutoComplete(){
  if(!ST.meta) ST.meta={};
  // undefined = ligado (default); false = desligado
  ST.meta.autoCompleteOnLastCheck = (ST.meta.autoCompleteOnLastCheck===false) ? true : false;
  saveK('meta');
  renderMais();
  showToast(ST.meta.autoCompleteOnLastCheck===false ? 'Auto-concluir desligado' : 'Auto-concluir ligado', 'ok', 1800);
}

let notifPermAsked=false;
function maybeRequestNotificationPermission(){
  if(notifPermAsked) return;
  if(!('Notification' in window)) return;
  notifPermAsked=true;
  try{
    if(Notification.permission==='default'){
      Notification.requestPermission().then(p=>{
        if(p==='granted') showToast('Notificações ativas ✓','ok',2000);
        else if(p==='denied') showToast('Notificações bloqueadas — só som dentro do app','warn',3500);
      }).catch(()=>{});
    }
  }catch(e){}
}

function notifyTimerDone(){
  if(!('Notification' in window)) return;
  if(Notification.permission!=='granted') return;
  const opts={
    body:'Próxima série!',
    icon:'icon-192.png',
    badge:'icon-192.png',
    tag:'meutreino-timer',
    renotify:true,
  };
  // Prefere SW.showNotification (melhor sobrevivência em bg) → fallback Notification direto
  try{
    if(navigator.serviceWorker && navigator.serviceWorker.ready){
      navigator.serviceWorker.ready.then(reg=>{
        if(reg && reg.showNotification){
          reg.showNotification('Descanso terminado', opts).catch(()=>{
            try{ new Notification('Descanso terminado', opts); }catch(e){}
          });
          return;
        }
        try{ new Notification('Descanso terminado', opts); }catch(e){}
      }).catch(()=>{
        try{ new Notification('Descanso terminado', opts); }catch(e){}
      });
    } else {
      new Notification('Descanso terminado', opts);
    }
  }catch(e){}
}

// Flash visual no overlay quando timer chega no fim
function flashDone(){
  const ov=document.getElementById('overlay');
  if(!ov || ov.classList.contains('hidden')) return;
  ov.classList.add('flash');
  setTimeout(()=>ov.classList.remove('flash'),700);
}

/* ============ SW REGISTER ============ */
if('serviceWorker' in navigator && (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ============ BOOT ============ */
async function boot(){
  // 1. Cleanup defensivo (phantom sessions de dias passados sem ✓)
  cleanupPhantomSessions();
  // 2. Storage seguro (resistente a ITP)
  await requestPersistentStorage();
  // 3. Aviso de quota se >80%
  await checkStorageQuota();
  // 4. Banner A2HS se não estiver em modo standalone
  maybeShowA2HSBanner();
  // 5. Backup reminder semanal (delay 1.5s pra não competir com outros toasts no boot)
  setTimeout(checkBackupReminder, 1500);
}
setTimer(90);
render();
boot();
