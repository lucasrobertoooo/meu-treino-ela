<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<meta name="theme-color" content="#0d0f14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Meu Treino</title>
<style>
  :root{
    --bg0:#0a0c11; --bg1:#10131a; --bg2:#161a23;
    --ink:#f1f3f7; --ink2:#d8dde8; --muted:#8a94a6; --faint:#5a6273;
    --glass:rgba(255,255,255,.045);
    --glass-2:rgba(255,255,255,.07);
    --glass-3:rgba(255,255,255,.10);
    --hi:rgba(255,255,255,.10);
    --hi-soft:rgba(255,255,255,.05);
    --line:rgba(255,255,255,.06);
    --line-2:rgba(255,255,255,.10);
    --shadow-1:0 1px 0 rgba(255,255,255,.06) inset, 0 -1px 0 rgba(0,0,0,.4) inset, 0 10px 30px -10px rgba(0,0,0,.7);
    --shadow-2:0 1px 0 rgba(255,255,255,.08) inset, 0 20px 50px -20px rgba(0,0,0,.85);
    --shadow-press:0 0 0 1px rgba(255,255,255,.04) inset, 0 2px 6px rgba(0,0,0,.5) inset;
    --push:#e0566f; --pull:#b06a86; --core:#f5b94e; --ok:#51d88a;
    --push-grad:linear-gradient(135deg,#ec6a82,#c33a54);
    --pull-grad:linear-gradient(135deg,#c07e98,#8f4d68);
    --core-grad:linear-gradient(135deg,#ffd178,#e09a2c);
    --r-lg:22px; --r-md:16px; --r-sm:12px;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0; color:var(--ink); overflow-x:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; font-feature-settings:"ss01","cv11";}
  html{
    background:#0a0c11;
    min-height:100vh;
    /* cobre toda a viewport, inclusive safe areas (status bar, home indicator) */
    min-height:100dvh;
  }
  body{
    background-color:#0a0c11;
    background-image:
      radial-gradient(120% 80% at 0% 0%, rgba(224,86,111,.11), transparent 50%),
      radial-gradient(110% 70% at 100% 0%, rgba(176,106,134,.09), transparent 55%),
      linear-gradient(180deg,#0a0c11 0%,#10131a 30%,#0e1118 100%);
    background-attachment:fixed;
    min-height:100vh;
    min-height:100dvh;
    padding-bottom:calc(96px + env(safe-area-inset-bottom));
  }
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}
  /* cardio (bike): 1 input de minutos, sem kg/RIR/timer */
  .setrow.r-cardio{display:grid; grid-template-columns:26px 1fr 38px; gap:8px; align-items:center; margin-bottom:8px;}
  .colhead.r-cardio{display:grid; grid-template-columns:26px 1fr 38px; gap:8px;}
  .pill.cardio{background:rgba(138,148,166,.20); color:#c3cad6;}
  .loc-toggle{display:flex; gap:6px; background:var(--glass-2); border:1px solid var(--line-2); border-radius:13px; padding:4px; margin:2px 0 16px;}
  .loc-opt{flex:1; border:none; background:transparent; color:var(--muted); font:inherit; font-size:13px; font-weight:700; padding:10px; border-radius:10px; cursor:pointer; transition:all .15s var(--ease);}
  .loc-opt.on{background:var(--push-grad); color:#fff; box-shadow:var(--shadow-1);}

  /* ============ HEADER ============ */
  header{
    position:sticky; top:0; z-index:30;
    padding:calc(14px + env(safe-area-inset-top)) 20px 14px;
    background:linear-gradient(180deg, rgba(10,12,17,.85), rgba(10,12,17,.55) 70%, transparent);
    backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
  }
  header h1{margin:0; font-size:22px; letter-spacing:-.025em; font-weight:700; color:var(--ink);}
  header h1 .tag{
    display:inline-block; margin-left:8px; padding:3px 9px; border-radius:8px;
    font-size:11px; font-weight:600; letter-spacing:.02em; color:var(--ink2);
    background:var(--glass-2); border:1px solid var(--line-2);
    vertical-align:3px;
  }
  header .sub{margin:4px 0 0; font-size:13px; color:var(--muted); font-weight:500;}

  main{padding:18px 16px 0; max-width:580px; margin:0 auto;}
  .hidden{display:none !important;}

  h2.sec{
    font-size:11px; letter-spacing:.1em; text-transform:uppercase;
    color:var(--faint); margin:24px 6px 12px; font-weight:700;
  }

  /* ============ DAY CARDS (Treinos A/B/C/D) ============ */
  .day{
    position:relative; display:flex; align-items:center; gap:16px;
    background:linear-gradient(180deg, #1a1f2b 0%, #131720 100%);
    border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:16px 18px 16px 16px;
    margin-bottom:12px; cursor:pointer;
    box-shadow:var(--shadow-1);
    transition:transform .15s var(--ease), background .2s var(--ease);
    overflow:hidden;
    min-height:88px;
  }
  .day .day-bg{
    position:absolute; top:0; right:0; bottom:0;
    width:75%; height:100%; object-fit:cover; object-position:center right;
    opacity:.55;
    -webkit-mask-image:linear-gradient(90deg, transparent 0%, rgba(0,0,0,.25) 35%, rgba(0,0,0,.65) 70%, #000 100%);
    mask-image:linear-gradient(90deg, transparent 0%, rgba(0,0,0,.25) 35%, rgba(0,0,0,.65) 70%, #000 100%);
    pointer-events:none;
    z-index:0;
    filter:saturate(.7) contrast(1.05);
  }
  .day::before{
    content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    background:linear-gradient(90deg, rgba(10,12,17,.92) 0%, rgba(10,12,17,.55) 38%, rgba(10,12,17,.10) 70%, transparent 100%);
    z-index:1;
  }
  .day::after{
    content:""; position:absolute; inset:0; pointer-events:none; border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 40%);
    z-index:2;
  }
  .day:active{transform:scale(.985);}
  .day > *{position:relative; z-index:3;}
  .day .badge{
    flex:none; width:56px; height:56px; border-radius:18px;
    display:grid; place-items:center;
    font-weight:800; font-size:24px; letter-spacing:-.02em;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.16);
    color:var(--ink);
    backdrop-filter:blur(20px) saturate(180%);
    -webkit-backdrop-filter:blur(20px) saturate(180%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.16) inset,
      0 -2px 6px rgba(0,0,0,.25) inset,
      0 8px 22px -8px rgba(0,0,0,.6);
    position:relative;
    overflow:hidden;
  }
  .day .badge::after{
    content:""; position:absolute; inset:0; border-radius:inherit;
    background:linear-gradient(180deg, rgba(255,255,255,.18), transparent 55%);
    pointer-events:none;
  }
  .day.push .badge{
    background:linear-gradient(135deg, rgba(255,125,111,.28), rgba(229,72,56,.10));
    border-color:rgba(255,125,111,.32);
    color:#ffd4cc;
    box-shadow:
      0 1px 0 rgba(255,255,255,.20) inset,
      0 -2px 6px rgba(0,0,0,.20) inset,
      0 8px 22px -8px rgba(229,72,56,.45);
  }
  .day.pull .badge{
    background:linear-gradient(135deg, rgba(122,178,255,.28), rgba(58,127,224,.10));
    border-color:rgba(122,178,255,.32);
    color:#cfe2ff;
    box-shadow:
      0 1px 0 rgba(255,255,255,.20) inset,
      0 -2px 6px rgba(0,0,0,.20) inset,
      0 8px 22px -8px rgba(58,127,224,.45);
  }
  .day .meta{flex:1; min-width:0;}
  .day .meta .t{font-size:17px; font-weight:700; letter-spacing:-.01em; text-shadow:0 1px 4px rgba(0,0,0,.5);}
  .day .meta .f{font-size:13px; color:var(--ink2); margin-top:2px; font-weight:500; text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .day .meta .cnt{font-size:11px; color:var(--muted); margin-top:4px; font-weight:600; letter-spacing:.02em; text-shadow:0 1px 3px rgba(0,0,0,.5);}
  .day .chev{color:var(--ink2); display:flex; align-items:center; text-shadow:0 1px 3px rgba(0,0,0,.5);}

  /* ============ BACK BAR ============ */
  .backbar{display:flex; align-items:center; gap:10px; margin:0 0 18px;}
  .back{
    display:inline-flex; align-items:center; gap:6px;
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); border-radius:14px; padding:10px 14px 10px 12px;
    font-size:14px; font-weight:600; cursor:pointer; letter-spacing:-.01em;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:var(--shadow-1);
  }
  .back:active{background:var(--glass-3);}

  /* ============ EXERCISE CARDS ============ */
  .ex{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); margin-bottom:16px; overflow:hidden;
    box-shadow:var(--shadow-2);
    backdrop-filter:blur(20px) saturate(160%); -webkit-backdrop-filter:blur(20px) saturate(160%);
    position:relative;
  }
  .ex::before{
    content:""; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.15), transparent);
    pointer-events:none;
  }
  .photo{
    position:relative; width:100%; aspect-ratio:1.85/1; overflow:hidden;
    background:linear-gradient(135deg,#1c2029,#0f1218);
  }
  .photo img{
    width:100%; height:100%; object-fit:cover; display:block;
    filter:brightness(.92) contrast(1.05) saturate(.88);
    transition:transform .4s var(--ease), opacity .3s var(--ease);
    opacity:0;
  }
  .photo img.loaded{opacity:1;}
  .photo::after{
    content:""; position:absolute; inset:0; pointer-events:none;
    background:linear-gradient(180deg, rgba(10,12,17,.08) 0%, rgba(10,12,17,.55) 65%, rgba(10,12,17,.95) 100%);
  }
  .photo .ovr{
    position:absolute; left:16px; right:16px; bottom:14px; z-index:2;
    display:flex; align-items:flex-end; gap:10px;
  }
  .photo .name{
    flex:1; font-size:18px; font-weight:700; line-height:1.2;
    letter-spacing:-.015em; color:#fff;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
  }
  .photo .ph-fallback{
    position:absolute; inset:0; display:grid; place-items:center;
    color:var(--faint); font-size:13px; font-weight:600;
  }
  /* fallback proposital (sem foto): gradiente rosa/vinho + brilho suave */
  .photo.noimg{background:linear-gradient(135deg, rgba(224,86,111,.30) 0%, rgba(143,77,104,.15) 55%, #10131a 100%);}
  .photo.noimg .ph-glow{
    position:absolute; right:-24px; top:-30px; width:140px; height:140px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.08), transparent 70%); pointer-events:none;
  }
  .pill{
    font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
    padding:4px 9px; border-radius:8px; flex:none;
    background:rgba(255,255,255,.14); color:#fff; backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,.15);
    align-self:flex-start;
  }
  .pill.iso{background:rgba(140,150,170,.25); color:#e8ebf0;}
  .pill.core{background:rgba(245,185,78,.30); color:#ffd887; border-color:rgba(245,185,78,.25);}
  .pill.comp{background:rgba(255,107,92,.28); color:#ffbab2; border-color:rgba(255,107,92,.25);}

  .ex .body{padding:16px 16px 14px;}
  .target{
    display:flex; align-items:center; gap:14px; margin-bottom:10px;
    font-size:13px; color:var(--muted); font-weight:500;
  }
  .target .met{
    display:inline-flex; align-items:baseline; gap:5px;
    color:var(--ink); font-weight:600;
  }
  .target .met b{font-size:16px; font-weight:700; letter-spacing:-.01em;}
  .target .dot{width:3px; height:3px; border-radius:50%; background:var(--faint);}
  .cue{
    font-size:13.5px; color:var(--ink2); line-height:1.5; margin-top:6px;
    padding:12px 14px; border-radius:14px;
    background:rgba(255,255,255,.03); border:1px solid var(--line);
  }
  .cue em{color:#fff; font-style:normal; font-weight:600;}

  /* nota pessoal do usuário (override) — visual distinto do cue científico */
  .exnote{
    display:flex; gap:8px; align-items:flex-start;
    font-size:13px; color:var(--core); line-height:1.5; margin-top:8px;
    padding:11px 13px; border-radius:14px;
    background:rgba(245,185,78,.08); border:1px solid rgba(245,185,78,.22);
    white-space:pre-wrap; word-break:break-word;
  }
  .exnote svg{flex:none; margin-top:2px; opacity:.85;}

  .exbtns{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px;}
  .xb{
    flex:1; display:inline-flex; align-items:center; justify-content:center; gap:7px;
    text-decoration:none;
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); border-radius:14px; padding:11px;
    font-size:13.5px; font-weight:600; cursor:pointer; letter-spacing:-.01em;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    box-shadow:0 1px 0 rgba(255,255,255,.05) inset;
    transition:background .15s var(--ease);
  }
  .xb:active{background:var(--glass-3);}
  .xb.rest{color:var(--core);}
  .xb svg{flex:none;}

  /* ============ MODAL EDITAR EXERCÍCIO ============ */
  .exedit-back{
    position:fixed; inset:0; z-index:120;
    background:rgba(4,6,10,.68); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
    display:flex; align-items:flex-end; justify-content:center;
    padding:0; animation:exfade .18s var(--ease);
  }
  @keyframes exfade{from{opacity:0}to{opacity:1}}
  .exedit-card{
    width:100%; max-width:560px; max-height:92vh; overflow-y:auto;
    background:var(--bg2); border:1px solid var(--line-2);
    border-radius:22px 22px 0 0; padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    box-shadow:0 -12px 40px rgba(0,0,0,.5); animation:exslide .22s var(--ease);
  }
  @keyframes exslide{from{transform:translateY(24px)}to{transform:translateY(0)}}
  .exedit-hd{
    display:flex; align-items:center; justify-content:space-between;
    font-size:16px; font-weight:700; color:var(--ink); margin-bottom:16px;
  }
  .exedit-x{
    background:none; border:none; color:var(--muted); font-size:26px; line-height:1;
    cursor:pointer; padding:0 4px;
  }
  .exedit-l{display:block; font-size:12px; font-weight:600; color:var(--muted); margin:14px 0 6px; letter-spacing:.01em;}
  .exedit-l:first-of-type{margin-top:0;}
  .exedit-in{
    width:100%; box-sizing:border-box; background:rgba(255,255,255,.04);
    border:1px solid var(--line-2); border-radius:12px; padding:12px 13px;
    color:var(--ink); font-size:15px; font-family:inherit; line-height:1.45;
  }
  .exedit-in:focus{outline:none; border-color:var(--core); background:rgba(255,255,255,.06);}
  .exedit-ta{resize:vertical; min-height:52px;}
  .exedit-hint{font-size:11.5px; color:var(--faint); margin:12px 2px 0; line-height:1.5;}
  .exedit-ctrl{display:flex; gap:8px; margin-top:18px;}
  .exedit-btn{
    border:1px solid var(--line-2); border-radius:13px; padding:12px 10px;
    font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;
    background:var(--glass-2); color:var(--ink);
  }
  .exedit-btn.ghost{flex:0 0 auto; color:var(--muted); background:none;}
  .exedit-btn.cancel{flex:1;}
  .exedit-btn.save{flex:1.4; background:var(--core-grad); color:#231a05; border-color:transparent;}
  .exedit-btn:active{opacity:.82;}
  .exedit-btn.ghost.hidden{display:none;}

  /* ============ LOGGING ============ */
  .log{
    background:rgba(0,0,0,.18);
    border-top:1px solid var(--line);
    padding:14px 16px 16px;
  }
  .last{
    font-size:12px; color:var(--faint); margin-bottom:11px;
    display:flex; align-items:center; gap:6px;
  }
  .last svg{opacity:.7;}
  .last b{color:var(--pull); font-weight:700;}
  .colhead{display:grid; grid-template-columns:28px 1fr 1fr 38px; gap:8px; margin-bottom:8px;}
  .colhead span{
    font-size:9.5px; color:var(--faint); text-transform:uppercase;
    letter-spacing:.08em; text-align:center; font-weight:700;
  }
  .setrow{
    display:grid; grid-template-columns:28px 1fr 1fr 38px; gap:8px;
    align-items:center; margin-bottom:8px;
  }
  .setrow .sn{
    font-size:13px; color:var(--faint); font-weight:700; text-align:center;
  }
  .setrow input{
    width:100%; background:var(--glass); border:1px solid var(--line-2);
    color:var(--ink); border-radius:12px; padding:12px 8px;
    font-size:16px; text-align:center; font-weight:700;
    font-variant-numeric:tabular-nums; letter-spacing:-.01em;
    transition:border-color .15s var(--ease), background .15s var(--ease);
    -webkit-appearance:none;
  }
  .setrow input:focus{
    outline:none; border-color:rgba(91,158,255,.55);
    background:rgba(91,158,255,.07);
    box-shadow:0 0 0 4px rgba(91,158,255,.10);
  }
  .setrow input::placeholder{color:var(--faint); font-weight:500;}
  .setrow .chk{
    width:38px; height:42px; border-radius:12px;
    border:1px solid var(--line-2); background:var(--glass);
    display:grid; place-items:center; cursor:pointer; color:var(--faint);
    transition:all .18s var(--ease);
  }
  .setrow .chk.on{
    background:linear-gradient(135deg,#5fe195,#3cb56a);
    border-color:transparent; color:#fff;
    box-shadow:0 1px 0 rgba(255,255,255,.25) inset, 0 4px 12px -2px rgba(81,216,138,.5);
  }
  .loghint{
    font-size:11px; color:var(--faint); display:flex;
    justify-content:space-between; align-items:center; margin-top:6px;
    padding:0 2px;
  }
  .saved{
    color:var(--ok); font-weight:700; opacity:0; transition:opacity .3s;
    display:inline-flex; align-items:center; gap:4px;
  }
  .saved.show{opacity:1;}

  /* ============ PRINCIPLES CARDS ============ */
  .pcard{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:18px 18px 16px;
    margin-bottom:12px; position:relative; overflow:hidden;
    backdrop-filter:blur(16px) saturate(160%);
    box-shadow:var(--shadow-1);
  }
  .pcard::before{
    content:""; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .pcard.c-gold::before{background:linear-gradient(180deg,#ffd178,#e09a2c);}
  .pcard.c-red::before{background:linear-gradient(180deg,#ff7d6f,#e54838);}
  .pcard.c-blue::before{background:linear-gradient(180deg,#7ab2ff,#3a7fe0);}
  .pcard.c-green::before{background:linear-gradient(180deg,#5fe195,#3cb56a);}
  .pcard .hd{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
  .pcard .ic{
    width:32px; height:32px; border-radius:10px; display:grid; place-items:center;
    background:var(--glass-2); border:1px solid var(--line-2);
  }
  .pcard.c-gold .ic{color:var(--core);}
  .pcard.c-red .ic{color:var(--push);}
  .pcard.c-blue .ic{color:var(--pull);}
  .pcard.c-green .ic{color:var(--ok);}
  .pcard h3{margin:0; font-size:15px; font-weight:700; letter-spacing:-.01em; color:var(--ink);}
  .pcard p{margin:0; font-size:13.5px; color:var(--ink2); line-height:1.55;}
  .pcard p b{color:#fff;}

  /* ============ VOLUME BARS ============ */
  .volcard{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:18px;
    backdrop-filter:blur(16px); box-shadow:var(--shadow-1);
  }
  .vbar{display:flex; align-items:center; gap:12px; margin-bottom:10px;}
  .vbar:last-of-type{margin-bottom:0;}
  .vbar .vn{width:88px; font-size:13.5px; color:var(--ink2); font-weight:600; letter-spacing:-.01em;}
  .vbar .track{
    flex:1; height:10px; background:rgba(255,255,255,.05);
    border-radius:5px; overflow:hidden;
    box-shadow:0 1px 1px rgba(0,0,0,.4) inset;
  }
  .vbar .fill{
    height:100%; border-radius:5px;
    box-shadow:0 1px 0 rgba(255,255,255,.2) inset;
  }
  .vbar .vv{width:32px; font-size:12px; color:var(--muted); font-weight:700; text-align:right;}
  .volnote{font-size:12px; color:var(--faint); margin:12px 0 0; line-height:1.5;}

  /* ============ INFO / MAIS ============ */
  .infocard{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:18px;
    margin-bottom:12px; backdrop-filter:blur(16px);
    box-shadow:var(--shadow-1);
  }
  .infocard h3{margin:0 0 10px; font-size:15px; font-weight:700; letter-spacing:-.01em;}
  .infocard p{margin:0 0 10px; font-size:13.5px; color:var(--ink2); line-height:1.55;}
  .infocard p:last-child{margin-bottom:0;}
  .anchor{
    display:flex; justify-content:space-between; align-items:center;
    padding:11px 0; border-bottom:1px solid var(--line);
    font-size:14px; color:var(--ink2);
  }
  .anchor:last-child{border-bottom:none;}
  .anchor b{color:var(--pull); font-weight:700; font-variant-numeric:tabular-nums;}

  .tools{display:flex; gap:8px; margin-top:12px;}
  .tools button{
    flex:1; background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); border-radius:12px; padding:11px;
    font-size:13px; font-weight:600; cursor:pointer; letter-spacing:-.01em;
    backdrop-filter:blur(8px);
  }
  .tools button:active{background:var(--glass-3);}
  textarea{
    width:100%; height:120px; background:rgba(0,0,0,.25);
    border:1px solid var(--line-2); color:var(--ink);
    border-radius:12px; padding:12px; font-size:12px; margin-top:12px;
    font-family:ui-monospace,SF Mono,Menlo,monospace;
    -webkit-appearance:none;
  }
  .foot{
    text-align:center; color:var(--faint); font-size:11px;
    margin:24px 0 4px; line-height:1.6;
  }

  /* ============ BOTTOM NAV (Tab bar) ============ */
  nav{
    position:fixed; left:12px; right:12px; bottom:calc(10px + env(safe-area-inset-bottom));
    z-index:35;
    background:rgba(22,26,35,.72);
    backdrop-filter:blur(30px) saturate(180%); -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--line-2); border-radius:24px;
    display:flex; padding:6px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.08) inset,
      0 -1px 0 rgba(0,0,0,.4) inset,
      0 20px 50px -10px rgba(0,0,0,.7);
  }
  nav button{
    flex:1; background:none; border:none; color:var(--muted); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    font-size:10.5px; font-weight:600; padding:9px 4px 7px;
    border-radius:18px; letter-spacing:-.005em;
    transition:all .2s var(--ease);
    position:relative;
  }
  nav button .ic{
    width:24px; height:24px; display:grid; place-items:center;
    transition:transform .2s var(--ease);
  }
  nav button.on{
    color:var(--ink);
    background:var(--glass-2);
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset;
  }
  nav button.on .ic{color:var(--push);}
  nav button:active .ic{transform:scale(.9);}

  /* ============ FAB (Timer) ============ */
  .fab{
    position:fixed; right:20px; bottom:calc(94px + env(safe-area-inset-bottom));
    z-index:32;
    background:linear-gradient(135deg,#ff7d6f,#e54838);
    color:#fff; border:none; border-radius:50%;
    width:56px; height:56px; cursor:pointer;
    display:grid; place-items:center;
    box-shadow:
      0 1px 0 rgba(255,255,255,.22) inset,
      0 -3px 8px rgba(0,0,0,.25) inset,
      0 10px 24px -4px rgba(229,72,56,.5),
      0 4px 12px rgba(0,0,0,.4);
    transition:transform .15s var(--ease);
  }
  .fab:active{transform:scale(.92);}

  /* ============ TIMER OVERLAY ============ */
  .overlay{
    position:fixed; inset:0; z-index:50;
    background:rgba(8,10,15,.65);
    backdrop-filter:blur(24px) saturate(140%); -webkit-backdrop-filter:blur(24px) saturate(140%);
    display:grid; place-items:center; padding:24px;
    animation:fadein .2s var(--ease);
  }
  .overlay.flash{ animation:timerflash .7s var(--ease); }
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes timerflash{
    0%{background:rgba(8,10,15,.65);}
    20%{background:rgba(81,216,138,.45);}
    100%{background:rgba(8,10,15,.65);}
  }
  .timer{
    background:linear-gradient(180deg, rgba(40,46,60,.85), rgba(22,26,35,.85));
    border:1px solid var(--line-2);
    border-radius:32px; padding:28px 26px;
    width:100%; max-width:340px; text-align:center;
    backdrop-filter:blur(40px); -webkit-backdrop-filter:blur(40px);
    box-shadow:
      0 1px 0 rgba(255,255,255,.1) inset,
      0 -2px 0 rgba(0,0,0,.3) inset,
      0 30px 80px -20px rgba(0,0,0,.7);
  }
  .ring{position:relative; width:220px; height:220px; margin:8px auto 18px;}
  .ring svg{transform:rotate(-90deg);}
  .ring .tval{
    position:absolute; inset:0; display:grid; place-items:center;
    font-size:58px; font-weight:700; font-variant-numeric:tabular-nums;
    letter-spacing:-.04em; color:var(--ink);
  }
  .presets{display:flex; gap:8px; justify-content:center; margin-bottom:16px;}
  .preset{
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); border-radius:14px; padding:10px 14px;
    font-size:13.5px; font-weight:700; cursor:pointer; letter-spacing:-.01em;
    transition:all .15s var(--ease);
  }
  .preset:active{background:var(--glass-3);}
  .preset.active{
    background:rgba(255,107,92,.18); border-color:rgba(255,107,92,.35);
    color:#ffb8b0;
  }
  .preset.core{color:var(--core);}
  .preset.core.active{
    background:rgba(245,185,78,.18); border-color:rgba(245,185,78,.35);
    color:#ffd887;
  }
  .tctrl{display:flex; gap:10px;}
  .tctrl button{
    flex:1; border:none; border-radius:16px; padding:14px;
    font-size:15px; font-weight:700; cursor:pointer; letter-spacing:-.01em;
    transition:transform .12s var(--ease);
  }
  .tctrl button:active{transform:scale(.97);}
  .tctrl .pp{
    background:linear-gradient(135deg,#ff7d6f,#e54838); color:#fff;
    box-shadow:
      0 1px 0 rgba(255,255,255,.2) inset,
      0 6px 16px -4px rgba(229,72,56,.5);
  }
  .tctrl .cl{
    background:var(--glass-2); color:var(--ink);
    border:1px solid var(--line-2);
  }

  /* ============ NOVO: setrow com RIR (4 cols) ============ */
  .colhead.r4{grid-template-columns:24px 1fr 1fr 52px 38px; gap:6px;}
  .setrow.r4{grid-template-columns:24px 1fr 1fr 52px 38px; gap:6px;}
  .setrow.r4 input{padding:12px 4px; font-size:15px;}
  .setrow.r4 input.rir{font-size:14px; color:var(--core);}
  .colhead.r4 span:nth-child(4){color:var(--core);}

  /* ============ PR BADGE + sugestão ============ */
  .pr-badge{
    position:absolute; top:12px; right:12px; z-index:3;
    background:linear-gradient(135deg,#ffd178,#e09a2c);
    color:#1a1408; font-weight:800; font-size:10.5px; letter-spacing:.06em;
    padding:5px 10px; border-radius:10px;
    box-shadow:0 4px 14px -2px rgba(245,185,78,.6), 0 1px 0 rgba(255,255,255,.35) inset;
    text-transform:uppercase;
    display:inline-flex; align-items:center; gap:4px;
  }
  .suggest{
    margin-top:8px; padding:10px 12px; border-radius:12px;
    background:linear-gradient(135deg, rgba(81,216,138,.10), rgba(81,216,138,.04));
    border:1px solid rgba(81,216,138,.25);
    font-size:12.5px; color:var(--ok); font-weight:600;
    display:flex; align-items:center; gap:8px;
  }
  .suggest .v{color:#fff; font-weight:800; letter-spacing:-.01em;}
  .suggest .why{color:var(--muted); font-weight:500; font-size:11px;}
  .plateau{
    margin-top:8px; padding:9px 12px; border-radius:12px;
    background:rgba(255,107,92,.08); border:1px solid rgba(255,107,92,.25);
    font-size:12px; color:#ffbab2; font-weight:600;
  }
  .swap{
    margin-top:8px; padding:12px 14px; border-radius:14px;
    background:linear-gradient(135deg, rgba(122,178,255,.12), rgba(91,158,255,.04));
    border:1px solid rgba(122,178,255,.28);
  }
  .swap-head{
    font-size:12px; font-weight:700; color:#cfe2ff;
    display:flex; align-items:center; gap:6px; margin-bottom:8px;
  }
  .swap-head b{color:#fff; font-weight:700;}
  .swap-head svg{flex:none;}
  .swap-list{display:flex; flex-direction:column; gap:4px; margin-bottom:8px;}
  .swap-alt{
    font-size:12.5px; color:var(--ink2); font-weight:500;
    padding:5px 0; line-height:1.45;
  }
  .swap-foot{
    font-size:10.5px; color:var(--faint); font-weight:500;
    line-height:1.5; padding-top:8px; border-top:1px solid rgba(255,255,255,.06);
  }

  /* ============ STAT CARDS (Hoje/Corpo) ============ */
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .stat{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:18px; padding:14px;
    backdrop-filter:blur(16px); box-shadow:var(--shadow-1);
    position:relative; overflow:hidden;
  }
  .stat .l{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:700;}
  .stat .v{font-size:24px; font-weight:800; letter-spacing:-.02em; color:var(--ink); margin-top:3px; font-variant-numeric:tabular-nums;}
  .stat .v small{font-size:13px; color:var(--muted); font-weight:600; letter-spacing:0;}
  .stat .s{font-size:11.5px; color:var(--muted); margin-top:2px; font-weight:600;}
  .stat.streak{background:linear-gradient(135deg, rgba(255,107,92,.18), rgba(229,72,56,.06)); border-color:rgba(255,107,92,.30);}
  .stat.streak .v{color:#ffbab2;}

  /* ============ HOJE: workout shortcut ============ */
  .todayworkout{
    display:flex; align-items:center; gap:14px;
    background:linear-gradient(135deg, rgba(91,158,255,.15), rgba(58,127,224,.05));
    border:1px solid rgba(91,158,255,.30);
    border-radius:var(--r-lg); padding:16px;
    margin-bottom:14px; cursor:pointer;
    box-shadow:var(--shadow-1);
  }
  .todayworkout.push{background:linear-gradient(135deg, rgba(255,107,92,.18), rgba(229,72,56,.06)); border-color:rgba(255,107,92,.30);}
  .todayworkout .badge{
    flex:none; width:52px; height:52px; border-radius:16px;
    display:grid; place-items:center; font-weight:800; font-size:22px; color:#fff;
  }
  .todayworkout.push .badge{background:var(--push-grad);}
  .todayworkout.pull .badge{background:var(--pull-grad);}
  .todayworkout .meta{flex:1;}
  .todayworkout .meta .l{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:700;}
  .todayworkout .meta .t{font-size:17px; font-weight:700; margin-top:2px;}
  .todayworkout .meta .f{font-size:12.5px; color:var(--muted); margin-top:2px;}
  /* já treinou hoje: card ganha tom verde de "feito" */
  .todayworkout.done{background:linear-gradient(135deg, rgba(81,216,138,.16), rgba(81,216,138,.04)); border-color:rgba(81,216,138,.32);}
  .todayworkout.done .meta .l{color:var(--ok);}
  /* próximo treino (discreto) abaixo do card de hoje */
  .nextworkout{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.03); border:1px solid var(--line);
    border-radius:16px; padding:11px 14px; margin:-4px 0 14px; cursor:pointer;
  }
  .nextworkout .nb{
    flex:none; width:30px; height:30px; border-radius:9px; background:var(--glass-2);
    display:grid; place-items:center; font-weight:800; font-size:14px; color:var(--ink2);
  }
  .nextworkout .nm{flex:1; font-size:13px; color:var(--muted);}
  .nextworkout .nm b{color:var(--ink2); font-weight:700;}
  .nextworkout .chev{color:var(--faint); display:flex;}

  /* tags nos cards da lista de treinos */
  .daytag{font-size:11px; font-weight:700; letter-spacing:.04em;}
  .daytag.today{color:var(--pull);}
  .daytag.next{color:var(--muted);}
  .daytag.done{color:var(--ok); display:inline-flex; align-items:center; gap:3px; vertical-align:1px;}
  .daytag.done svg{width:12px; height:12px;}

  /* mini-histórico no topo do treino aberto */
  .wkhist{
    background:rgba(255,255,255,.03); border:1px solid var(--line);
    border-radius:16px; padding:12px 14px; margin-bottom:14px;
  }
  .wkh-h{font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px; margin-bottom:8px;}
  .wkh-h svg{width:12px; height:12px; opacity:.8;}
  .wkh-row{display:flex; align-items:baseline; gap:10px; font-size:13px; padding:3px 0; border-top:1px solid var(--line);}
  .wkh-row:first-of-type{border-top:none;}
  .wkh-d{flex:none; width:52px; color:var(--muted); font-variant-numeric:tabular-nums;}
  .wkh-v{flex:none; width:64px; color:var(--core); font-weight:700; font-variant-numeric:tabular-nums;}
  .wkh-s{flex:1; color:var(--faint); font-size:12px;}

  /* histórico completo na aba Corpo */
  .histcard{background:var(--glass); border:1px solid var(--line-2); border-radius:var(--r-lg); padding:6px 14px; margin-bottom:14px; backdrop-filter:blur(16px);}
  .hrow{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid var(--line);}
  .hrow:first-child{border-top:none;}
  .hbadge{flex:none; width:36px; height:36px; border-radius:11px; display:grid; place-items:center; font-weight:800; font-size:15px; color:#fff; background:var(--glass-2);}
  .hbadge.push{background:var(--push-grad);} .hbadge.pull{background:var(--pull-grad);}
  .hmeta{flex:1; min-width:0;}
  .hnm{font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .hsub{font-size:12px; color:var(--muted); margin-top:1px; font-variant-numeric:tabular-nums;}
  .hdur{flex:none; font-size:15px; font-weight:700; color:var(--core); font-variant-numeric:tabular-nums;}

  /* ============ CHECKLIST / DAILY ============ */
  .check-card{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:16px;
    margin-bottom:12px; backdrop-filter:blur(16px); box-shadow:var(--shadow-1);
  }
  .check-card h3{
    margin:0 0 12px; font-size:14px; font-weight:700; letter-spacing:-.01em;
    display:flex; align-items:center; gap:8px; color:var(--ink);
  }
  .check-card h3 .ic{color:var(--pull); width:18px; height:18px; display:grid; place-items:center;}
  .check-row{
    display:flex; align-items:center; gap:12px;
    padding:10px 0; border-top:1px solid var(--line);
  }
  .check-row:first-of-type{border-top:none;}
  .check-row .nm{flex:1; font-size:13.5px; color:var(--ink2); font-weight:500;}
  .check-row .nm small{display:block; color:var(--faint); font-size:11px; font-weight:400; margin-top:2px;}
  .toggle{
    width:42px; height:26px; border-radius:13px;
    background:var(--glass-2); border:1px solid var(--line-2);
    position:relative; cursor:pointer; flex:none;
    transition:all .2s var(--ease);
  }
  .toggle::after{
    content:""; position:absolute; top:2px; left:2px;
    width:20px; height:20px; border-radius:50%;
    background:#fff; transition:all .2s var(--ease);
    box-shadow:0 2px 4px rgba(0,0,0,.3);
  }
  .toggle.on{background:linear-gradient(135deg,#5fe195,#3cb56a); border-color:transparent;}
  .toggle.on::after{left:18px;}

  /* ============ INPUT BLOCK (numeric quick-log) ============ */
  .ilog{
    display:flex; align-items:center; gap:8px;
    padding:8px 0;
  }
  .ilog .lb{flex:1; font-size:13.5px; color:var(--ink2); font-weight:500;}
  .ilog input{
    width:78px; background:var(--glass); border:1px solid var(--line-2);
    color:var(--ink); border-radius:10px; padding:9px 6px;
    font-size:15px; text-align:center; font-weight:700;
    font-variant-numeric:tabular-nums; -webkit-appearance:none;
  }
  .ilog input:focus{outline:none; border-color:rgba(91,158,255,.55); background:rgba(91,158,255,.07);}
  .ilog .u{font-size:11px; color:var(--faint); font-weight:600; width:24px;}
  .ilog .qb{
    width:32px; height:32px; border-radius:10px;
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); display:grid; place-items:center; cursor:pointer;
  }
  .ilog .qb:active{background:var(--glass-3);}

  /* ============ PROTEIN ANCHORS COUNTER ============ */
  .panchor{
    display:flex; align-items:center; gap:10px;
    padding:9px 0; border-top:1px solid var(--line);
  }
  .panchor:first-of-type{border-top:none;}
  .panchor .nm{flex:1; font-size:13px; color:var(--ink2); font-weight:500;}
  .panchor .nm small{color:var(--faint); font-size:11px; margin-left:4px;}
  .panchor .qb{
    width:30px; height:30px; border-radius:9px;
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--ink); display:grid; place-items:center; cursor:pointer; font-size:14px;
  }
  .panchor .qb:active{background:var(--glass-3);}
  .panchor .cnt{
    min-width:24px; text-align:center; font-size:13px; font-weight:800;
    color:var(--ok); font-variant-numeric:tabular-nums;
  }
  .ptotal{
    margin-top:12px; padding:12px 14px; border-radius:14px;
    background:linear-gradient(135deg, rgba(81,216,138,.14), rgba(60,181,106,.04));
    border:1px solid rgba(81,216,138,.25);
    display:flex; align-items:baseline; justify-content:space-between;
  }
  .ptotal .l{font-size:12px; color:var(--muted); font-weight:600;}
  .ptotal .v{font-size:24px; font-weight:800; color:var(--ok); letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .ptotal .v small{font-size:14px; color:var(--muted); font-weight:600;}

  /* ============ VOLUME BARS COMPLETO (Corpo) ============ */
  .vbar2{display:flex; align-items:center; gap:10px; margin-bottom:9px; padding:2px 0;}
  .vbar2 .vn{width:96px; font-size:12.5px; color:var(--ink2); font-weight:600;}
  .vbar2 .vn.prio{color:#fff;}
  .vbar2 .vn .star{color:var(--core); font-size:9px; margin-left:3px;}
  .vbar2 .track{
    flex:1; height:8px; background:rgba(255,255,255,.05);
    border-radius:4px; overflow:hidden; position:relative;
    box-shadow:0 1px 1px rgba(0,0,0,.4) inset;
  }
  .vbar2 .fill{height:100%; border-radius:4px;}
  .vbar2 .vv{width:54px; font-size:11px; color:var(--muted); font-weight:700; text-align:right; font-variant-numeric:tabular-nums;}
  .vbar2 .vv b{color:var(--ink);}

  /* ============ FOTOS PROGRESSO ============ */
  .photos-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px;}
  .pthumb{
    position:relative; aspect-ratio:3/4; border-radius:12px; overflow:hidden;
    background:var(--glass-2); border:1px solid var(--line-2);
  }
  .pthumb img{width:100%; height:100%; object-fit:cover;}
  .pthumb .pdate{
    position:absolute; bottom:0; left:0; right:0;
    padding:4px 6px; font-size:9.5px; font-weight:700;
    color:#fff; text-align:center;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.7));
    letter-spacing:.02em;
  }
  .pthumb .px{
    position:absolute; top:4px; right:4px;
    width:22px; height:22px; border-radius:50%;
    background:rgba(0,0,0,.6); color:#fff; border:none;
    display:grid; place-items:center; font-size:12px; font-weight:700; cursor:pointer;
  }
  .uploadbtn{
    display:block; width:100%; padding:14px;
    background:var(--glass-2); border:1px dashed rgba(255,255,255,.18);
    border-radius:14px; color:var(--ink2); font-size:13px; font-weight:600;
    text-align:center; cursor:pointer; margin-top:8px;
  }
  .uploadbtn input{display:none;}

  /* ============ MINI SPARKLINE (peso) ============ */
  .spark-card{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:16px;
    margin-bottom:12px; backdrop-filter:blur(16px); box-shadow:var(--shadow-1);
  }
  .spark-card .hdr{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px;}
  .spark-card .hdr .l{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:700;}
  .spark-card .hdr .v{font-size:28px; font-weight:800; color:var(--ink); letter-spacing:-.02em; font-variant-numeric:tabular-nums;}
  .spark-card .hdr .v small{font-size:13px; color:var(--muted); font-weight:600;}
  .spark-card .delta{font-size:12px; font-weight:700; padding:3px 8px; border-radius:8px;}
  .spark-card .delta.up{color:#5fe195; background:rgba(95,225,149,.10);}
  .spark-card .delta.dn{color:#ffb87a; background:rgba(255,184,122,.10);}
  .spark-card svg.spark{width:100%; height:50px; display:block; margin-top:6px;}

  /* ============ DELOAD ALERT ============ */
  .deload-alert{
    background:linear-gradient(135deg, rgba(255,107,92,.18), rgba(229,72,56,.05));
    border:1px solid rgba(255,107,92,.35);
    border-radius:var(--r-lg); padding:14px 16px;
    margin-bottom:14px; display:flex; align-items:center; gap:12px;
  }
  .deload-alert .ic{flex:none; color:var(--push);}
  .deload-alert .meta{flex:1;}
  .deload-alert .meta .t{font-size:13.5px; font-weight:700; color:#ffbab2;}
  .deload-alert .meta .f{font-size:11.5px; color:var(--muted); margin-top:2px;}
  .deload-alert button{
    background:rgba(255,255,255,.10); border:1px solid var(--line-2);
    color:#fff; border-radius:10px; padding:7px 11px;
    font-size:11px; font-weight:700; cursor:pointer;
  }

  /* ============ SECTION HEADER PRO HOJE ============ */
  .day-header{
    margin:0 4px 14px; display:flex; align-items:baseline; justify-content:space-between;
  }
  .day-header .greet{font-size:22px; font-weight:700; color:var(--ink); letter-spacing:-.02em;}
  .day-header .date{font-size:13px; color:var(--muted); font-weight:600;}

  /* ============ NAV 4 abas — texto menor */
  nav button{font-size:10px;}
  nav button .ic svg{width:20px; height:20px;}

  /* ============ FOOD SEARCH (proteína) ============ */
  .foodbox{margin-top:4px;}
  .foodsearch{
    width:100%; background:var(--glass); border:1px solid var(--line-2);
    color:var(--ink); border-radius:14px; padding:13px 14px;
    font-size:15px; font-weight:500; -webkit-appearance:none;
    font-family:inherit;
  }
  .foodsearch::placeholder{color:var(--faint);}
  .foodsearch:focus{
    outline:none; border-color:rgba(81,216,138,.45);
    background:rgba(81,216,138,.06);
    box-shadow:0 0 0 4px rgba(81,216,138,.08);
  }
  .foodlist{
    margin-top:8px; max-height:280px; overflow-y:auto;
    border-radius:12px;
  }
  .foodlist:empty{margin-top:0;}
  .food-item{
    display:flex; align-items:center; gap:12px;
    padding:11px 12px; cursor:pointer; border-radius:10px;
    transition:background .12s var(--ease);
    border:1px solid transparent;
  }
  .food-item:active{background:rgba(81,216,138,.10); border-color:rgba(81,216,138,.20);}
  .food-item .fnm{flex:1; font-size:13.5px; color:var(--ink); font-weight:600;}
  .food-item .fnm small{display:block; font-size:11px; color:var(--faint); font-weight:500; margin-top:1px;}
  .food-item .fp{
    font-size:14px; font-weight:800; color:var(--ok);
    font-variant-numeric:tabular-nums; letter-spacing:-.02em;
    padding:6px 12px; background:rgba(81,216,138,.10);
    border-radius:10px; border:1px solid rgba(81,216,138,.18);
  }
  .food-empty{
    padding:14px; text-align:center; font-size:12.5px; color:var(--faint);
  }
  .foodlog{
    margin-top:12px; border-top:1px solid var(--line); padding-top:10px;
  }
  .food-entry{
    display:flex; align-items:center; gap:10px;
    padding:8px 0; border-top:1px solid var(--line);
  }
  .food-entry:first-of-type{border-top:none;}
  .food-entry .fnm{flex:1; font-size:13px; color:var(--ink2); font-weight:500;}
  .food-entry .fnm small{color:var(--faint); font-size:10.5px; margin-left:5px;}
  .food-entry .fp{
    font-size:12.5px; font-weight:800; color:var(--ok);
    font-variant-numeric:tabular-nums; min-width:38px; text-align:right;
  }
  .food-entry .fx{
    width:26px; height:26px; border-radius:50%; flex:none;
    background:var(--glass-2); border:1px solid var(--line-2);
    color:var(--faint); font-size:14px; font-weight:700; cursor:pointer;
    display:grid; place-items:center; padding:0;
  }
  .food-entry .fx:active{background:rgba(255,107,92,.15); color:#ffbab2;}
  .pbar{
    margin:5px 0 11px; height:6px; background:rgba(255,255,255,.05);
    border-radius:3px; overflow:hidden;
  }
  .pbar-fill{
    height:100%; border-radius:3px;
    box-shadow:0 1px 0 rgba(255,255,255,.2) inset;
    transition:width .3s var(--ease);
  }
  .pbar-fill.prot{background:linear-gradient(90deg,#5fe19588,#5fe195);}
  .pbar-fill.carb{background:linear-gradient(90deg,#7ab2ff88,#5b9eff);}
  .pbar-fill.cal{background:linear-gradient(90deg,#ffd17888,#f5b94e);}

  .macro-block{
    padding:14px 14px 8px;
    border-radius:14px;
    background:rgba(0,0,0,.18);
    border:1px solid var(--line);
  }
  .macro-row{display:flex; align-items:baseline; justify-content:space-between;}
  .macro-row .ml{font-size:12.5px; color:var(--muted); font-weight:600; letter-spacing:-.01em;}
  .macro-row .mv{font-size:14px; color:var(--ink); font-weight:700; font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
  .macro-row .mv b{font-size:18px; font-weight:800;}
  .macro-row .mv small{font-size:11px; color:var(--faint); font-weight:600;}
  .macro-foot{
    margin-top:10px; font-size:11px; color:var(--faint); text-align:center;
    text-transform:uppercase; letter-spacing:.06em; font-weight:700;
  }

  /* food entry macros + result macros */
  .food-entry .fmacros{
    font-size:11px; font-weight:600; color:var(--muted);
    font-variant-numeric:tabular-nums; white-space:nowrap;
  }
  .food-entry .fmacros b{color:var(--ok); font-weight:800; font-size:12px;}
  .food-item .fmac{
    font-size:11px; font-weight:600; color:var(--muted);
    font-variant-numeric:tabular-nums; white-space:nowrap;
    padding:5px 9px; background:rgba(255,255,255,.04);
    border:1px solid var(--line); border-radius:8px;
  }
  .food-item .fmac b{color:var(--ok); font-weight:800; font-size:13px;}
  .food-item .fmac .sep{color:var(--faint); margin:0 4px;}

  /* ============ ALIMENTO PERSONALIZADO ============ */
  .custom-btn{
    margin-top:10px; width:100%;
    background:var(--glass-2); border:1px dashed rgba(255,255,255,.16);
    color:var(--ink2); border-radius:12px; padding:11px;
    font-size:13px; font-weight:600; cursor:pointer; letter-spacing:-.01em;
    display:flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit;
  }
  .custom-btn:active{background:var(--glass-3);}
  .custom-btn .ic{display:grid; place-items:center; color:var(--ok);}
  .custom-form{
    margin-top:12px; padding:14px;
    background:rgba(81,216,138,.05);
    border:1px solid rgba(81,216,138,.18);
    border-radius:14px;
    display:flex; flex-direction:column; gap:10px;
  }
  .cf-input{
    width:100%; background:var(--glass); border:1px solid var(--line-2);
    color:var(--ink); border-radius:10px; padding:11px 12px;
    font-size:14px; font-weight:500; -webkit-appearance:none;
    font-family:inherit;
  }
  .cf-input:focus{outline:none; border-color:rgba(81,216,138,.45); background:rgba(81,216,138,.06);}
  .cf-input::placeholder{color:var(--faint);}
  .cf-macros{
    display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;
  }
  .cf-mac{display:flex; flex-direction:column; gap:4px;}
  .cf-mac label{
    font-size:10.5px; font-weight:700; color:var(--muted);
    letter-spacing:.04em; text-transform:uppercase; text-align:center;
  }
  .cf-i{
    display:flex; align-items:center; gap:3px;
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:10px; padding:6px 8px;
  }
  .cf-i:focus-within{border-color:rgba(81,216,138,.45); background:rgba(81,216,138,.06);}
  .cf-i input{
    flex:1; min-width:0; background:none; border:none; color:var(--ink);
    font-size:15px; font-weight:700; text-align:center;
    font-variant-numeric:tabular-nums; -webkit-appearance:none;
    font-family:inherit;
    padding:4px 0;
  }
  .cf-i input:focus{outline:none;}
  .cf-i span{font-size:10px; color:var(--faint); font-weight:600;}
  .cf-actions{display:flex; gap:8px; margin-top:4px;}
  .cf-actions button{
    flex:1; border-radius:10px; padding:11px;
    font-size:13.5px; font-weight:700; cursor:pointer; letter-spacing:-.01em;
    border:1px solid transparent; font-family:inherit;
  }
  .cf-cancel{
    background:var(--glass-2); color:var(--ink2); border-color:var(--line-2);
  }
  .cf-cancel:active{background:var(--glass-3);}
  .cf-add{
    background:linear-gradient(135deg,#5fe195,#3cb56a); color:#fff;
    box-shadow:0 1px 0 rgba(255,255,255,.2) inset, 0 6px 16px -4px rgba(81,216,138,.4);
  }
  .cf-add:active{transform:scale(.98);}
  .cf-hint{
    margin:0; font-size:11px; color:var(--faint); line-height:1.45; text-align:center;
  }

  /* ============ TOAST + A2HS BANNER + TIMER DONE ============ */
  .toast{
    position:fixed; top:calc(env(safe-area-inset-top,0px) + 14px);
    left:50%; transform:translateX(-50%);
    background:rgba(28,28,32,.94); color:var(--ink);
    padding:11px 18px; border-radius:14px;
    border:1px solid var(--line-2);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    z-index:9999; max-width:90vw; text-align:center;
    font-size:13.5px; font-weight:600; line-height:1.4;
    box-shadow:0 8px 28px -8px rgba(0,0,0,.5);
    transition:opacity .25s var(--ease), transform .25s var(--ease);
  }
  .toast.hidden{opacity:0; transform:translate(-50%,-12px); pointer-events:none; display:block !important;}
  .toast.warn{background:rgba(229,72,56,.95); color:#fff; border-color:rgba(255,255,255,.2);}
  .toast.ok{background:rgba(81,216,138,.95); color:#0a2614; border-color:rgba(255,255,255,.25);}

  .a2hs-banner{
    margin:12px 14px 0; padding:11px 14px;
    background:linear-gradient(135deg, rgba(91,158,255,.16), rgba(91,158,255,.04));
    border:1px solid rgba(91,158,255,.28);
    border-radius:12px;
    display:flex; gap:10px; align-items:flex-start;
    font-size:12.5px; line-height:1.45; color:var(--ink2);
  }
  .a2hs-banner .a2hs-msg{flex:1;}
  .a2hs-banner b{color:var(--ink);}
  .a2hs-banner .a2hs-close{
    flex:none; width:24px; height:24px; line-height:22px;
    text-align:center; border:none; background:transparent;
    color:var(--faint); font-size:20px; cursor:pointer; padding:0;
  }

  .overlay[data-state="done"] .tctrl .pp{
    background:linear-gradient(135deg,#5fe195,#3cb56a) !important;
    box-shadow:0 1px 0 rgba(255,255,255,.25) inset, 0 6px 16px -4px rgba(81,216,138,.55) !important;
  }
  .overlay[data-state="done"] .tval{color:var(--ok); transition:color .3s var(--ease);}
  .overlay[data-state="done"] #ringfill{stroke:#5fe195; transition:stroke .3s var(--ease);}

  .shortcut-link{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin:0 0 18px; padding:14px 22px;
    background:linear-gradient(135deg,#5aa6ff,#3f7fe0);
    border:none; border-radius:28px;
    color:#fff; text-decoration:none;
    font-size:15px; font-weight:700; letter-spacing:.01em;
    box-shadow:0 4px 14px -4px rgba(90,140,255,.6);
    transition:transform .12s var(--ease), box-shadow .18s var(--ease);
    -webkit-tap-highlight-color:transparent;
  }
  .shortcut-link:active{ transform:scale(.97); box-shadow:0 2px 8px -2px rgba(90,140,255,.5); }
  .shortcut-link.hidden{ display:none !important; }
  .shortcut-link::before{
    content:""; width:18px; height:18px;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='10'/><polyline points='12,6 12,12 16,14'/></svg>") no-repeat center/contain;
  }

  /* ============ FAB Speed Dial (item 6) ============ */
  .fab.fab-main{ z-index:60; }
  .fab.fab-main #fabIcon{ transition:transform .25s var(--ease); }
  .fab.fab-main.open #fabIcon{ transform:rotate(45deg); }
  .session-badge{
    position:absolute; top:-6px; right:-8px;
    background:var(--ok); color:#0a2614;
    font-size:9.5px; font-weight:800; letter-spacing:.02em;
    padding:3px 6px; border-radius:9px;
    border:2px solid var(--bg);
    min-width:32px; text-align:center;
    animation: sessPulse 2s ease-in-out infinite;
  }
  .session-badge.paused{ background:#f5b94e; color:#1a1408; animation:none; }
  @keyframes sessPulse{
    0%,100%{ box-shadow:0 0 0 0 rgba(81,216,138,.5); }
    50%{ box-shadow:0 0 0 6px rgba(81,216,138,0); }
  }

  .fab-menu{
    position:fixed; right:20px;
    /* 94px FAB bottom + 56px FAB height + 14px gap = 164px above bottom */
    bottom:calc(164px + env(safe-area-inset-bottom,0px));
    z-index:55;
    display:flex; flex-direction:column-reverse; gap:10px;
    pointer-events:none;
  }
  .fab-menu.open{ pointer-events:auto; }
  .fab-action{
    display:flex; align-items:center; gap:8px;
    background:rgba(28,28,32,.94); color:var(--ink);
    padding:9px 14px 9px 11px; border-radius:22px;
    border:1px solid var(--line-2);
    font-size:13px; font-weight:600;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:0 6px 18px -4px rgba(0,0,0,.45);
    opacity:0; transform:translateY(10px) scale(.92);
    transition:opacity .22s var(--ease), transform .22s var(--ease);
    cursor:pointer; white-space:nowrap;
  }
  .fab-menu.open .fab-action{ opacity:1; transform:translateY(0) scale(1); }
  .fab-menu.open .fab-action:nth-child(1){ transition-delay:.04s; }
  .fab-menu.open .fab-action:nth-child(2){ transition-delay:.08s; }
  .fab-menu.open .fab-action:nth-child(3){ transition-delay:.12s; }
  .fab-action .ic{ display:inline-flex; }
  .fab-action.start{ background:linear-gradient(135deg,#5fe195,#3cb56a); color:#0a2614; border-color:rgba(255,255,255,.18); }
  .fab-action.stop{ background:linear-gradient(135deg,#ff7d6f,#e54838); color:#fff; border-color:rgba(255,255,255,.18); }

  /* Session chip no header do treino aberto */
  .session-chip{
    display:inline-flex; align-items:center; gap:6px;
    margin:8px 0 4px;
    padding:6px 12px;
    background:linear-gradient(135deg, rgba(81,216,138,.20), rgba(81,216,138,.08));
    border:1px solid rgba(81,216,138,.35);
    border-radius:18px;
    font-variant-numeric:tabular-nums;
    font-size:13px; font-weight:700; color:var(--ok);
  }
  .session-chip.paused{
    background:linear-gradient(135deg, rgba(245,185,78,.22), rgba(245,185,78,.08));
    border-color:rgba(245,185,78,.4);
    color:#f5b94e;
  }
  .session-chip .label{font-size:11px; color:var(--muted); font-weight:500; letter-spacing:.04em; text-transform:uppercase;}

  /* ============ CELEBRATION MODAL (item 10) ============ */
  .celebration{
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.85); backdrop-filter:blur(8px);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    animation:celebFadeIn .3s var(--ease);
  }
  @keyframes celebFadeIn{ from{opacity:0;} to{opacity:1;} }
  .celeb-card{
    max-width:380px; width:100%;
    background:linear-gradient(180deg, rgba(40,40,46,.98), rgba(28,28,32,.98));
    border:1px solid var(--line-2);
    border-radius:24px;
    padding:28px 24px 22px;
    box-shadow:0 24px 80px -20px rgba(0,0,0,.6);
    text-align:center;
    animation:celebSlideUp .4s var(--ease);
  }
  @keyframes celebSlideUp{
    from{ opacity:0; transform:translateY(20px) scale(.95); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .celeb-title{
    font-size:20px; font-weight:800;
    color:var(--ink);
    margin-bottom:18px;
    letter-spacing:-.02em;
  }
  .celeb-hero{
    padding:18px 14px;
    border-radius:16px;
    margin-bottom:18px;
    font-size:16px; font-weight:700;
    line-height:1.4;
  }
  .celeb-hero.pr{
    background:linear-gradient(135deg, rgba(255,209,120,.22), rgba(224,154,44,.08));
    border:1px solid rgba(255,209,120,.4);
    color:#ffd178;
  }
  .celeb-hero.progress{
    background:linear-gradient(135deg, rgba(81,216,138,.18), rgba(81,216,138,.06));
    border:1px solid rgba(81,216,138,.35);
    color:#5fe195;
  }
  .celeb-hero.done{
    background:linear-gradient(135deg, rgba(91,158,255,.18), rgba(91,158,255,.04));
    border:1px solid rgba(91,158,255,.3);
    color:#7ab2ff;
  }
  .celeb-pr-line{
    display:block; margin-top:6px;
    font-size:13.5px; font-weight:600;
    color:var(--ink2); opacity:.85;
  }
  .celeb-stats{
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
    margin-bottom:22px;
  }
  .celeb-stat{
    background:rgba(255,255,255,.04);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 8px;
  }
  .celeb-stat .l{
    font-size:10px; font-weight:600; color:var(--muted);
    letter-spacing:.05em; text-transform:uppercase;
    margin-bottom:4px;
  }
  .celeb-stat .v{
    font-size:20px; font-weight:800; color:var(--ink);
    font-variant-numeric:tabular-nums;
  }
  .celeb-stat .v small{ font-size:12px; color:var(--muted); font-weight:600; margin-left:2px; }
  .celeb-ok{
    width:100%; padding:14px;
    background:linear-gradient(135deg,#5fe195,#3cb56a); color:#0a2614;
    border:none; border-radius:14px;
    font-size:15px; font-weight:800;
    cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,.25) inset, 0 8px 18px -6px rgba(81,216,138,.5);
    transition:transform .15s var(--ease);
  }
  .celeb-ok:active{ transform:scale(.97); }

  /* ============ TIMER MINIMIZE BTN + MINI TIMER (item 1 partial) ============ */
  .minimize-btn{
    position:absolute; top:calc(env(safe-area-inset-top,0px) + 18px); right:18px;
    width:38px; height:38px;
    background:var(--glass-2);
    border:1px solid var(--line-2);
    color:var(--ink); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:5;
    transition:transform .15s var(--ease), background .15s;
  }
  .minimize-btn:active{ transform:scale(.92); background:var(--glass-3); }

  .mini-timer{
    position:fixed;
    top:calc(env(safe-area-inset-top,0px) + 76px);
    left:50%; transform:translateX(-50%);
    z-index:80;
    display:flex; align-items:center; gap:10px;
    background:linear-gradient(135deg, rgba(255,107,92,.96), rgba(229,72,56,.96));
    color:#fff;
    padding:9px 8px 9px 14px;
    border-radius:24px;
    font-variant-numeric:tabular-nums;
    font-weight:800; font-size:15.5px;
    box-shadow:0 8px 22px -6px rgba(229,72,56,.55);
    cursor:pointer;
    transition:transform .18s var(--ease);
    border:1px solid rgba(255,255,255,.18);
    -webkit-tap-highlight-color:transparent;
  }
  .mini-timer:active{ transform:translateX(-50%) scale(.96); }
  .mini-timer .mt-ic{ display:inline-flex; opacity:.9; }
  .mini-timer .mt-val{ letter-spacing:-.01em; }
  .mini-timer .mt-x{
    background:rgba(255,255,255,.22); border:none;
    color:#fff; width:24px; height:24px;
    border-radius:12px;
    font-size:14px; font-weight:700; line-height:1;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .mini-timer[data-state="done"]{
    background:linear-gradient(135deg, #5fe195, #3cb56a);
    box-shadow:0 8px 22px -6px rgba(81,216,138,.55);
    color:#0a2614;
    animation:miniDonePulse 1.4s ease-in-out infinite;
  }
  .mini-timer[data-state="done"] .mt-x{ background:rgba(0,0,0,.18); color:#0a2614; }
  @keyframes miniDonePulse{
    0%,100%{ box-shadow:0 8px 22px -6px rgba(81,216,138,.55); }
    50%{ box-shadow:0 8px 22px -6px rgba(81,216,138,.9), 0 0 0 4px rgba(81,216,138,.2); }
  }

  /* ============ PRE-WORKOUT TIP CARD (item 4) ============ */
  .pretip{
    margin:14px 0 4px;
    padding:14px 16px;
    background:linear-gradient(135deg, rgba(91,158,255,.14), rgba(91,158,255,.04));
    border:1px solid rgba(91,158,255,.25);
    border-radius:14px;
  }
  .pretip .pretip-hd{
    display:flex; align-items:center; gap:7px;
    font-size:11px; font-weight:700; color:#7ab2ff;
    letter-spacing:.06em; text-transform:uppercase;
    margin-bottom:6px;
  }
  .pretip .pretip-title{
    font-size:14.5px; font-weight:700; color:var(--ink);
    margin-bottom:5px; line-height:1.3;
  }
  .pretip .pretip-body{
    font-size:12.5px; color:var(--ink2); line-height:1.5;
  }
  .pretip .pretip-body b{ color:#fff; }

  /* ============ TREINO EM CASA (home sessions) ============ */
  .home-card{
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(135deg, rgba(168,230,168,.13), rgba(120,200,120,.04));
    border:1px solid rgba(168,230,168,.30);
    border-radius:var(--r-lg); padding:14px;
    margin-bottom:10px; cursor:pointer;
    box-shadow:var(--shadow-1);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .home-card:active{ transform:scale(.985); }
  .home-card.avoid{
    background:linear-gradient(135deg, rgba(255,107,92,.10), rgba(229,72,56,.03));
    border-color:rgba(255,107,92,.25);
    opacity:.78;
  }
  .home-card.ok{
    background:linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
    border-color:var(--line-2);
  }
  .home-card .home-ic{
    flex:none; width:44px; height:44px; border-radius:14px;
    display:grid; place-items:center;
    font-size:10px; font-weight:800; letter-spacing:.08em;
    background:rgba(168,230,168,.20); color:#a8e6a8;
  }
  .home-card.avoid .home-ic{ background:rgba(255,107,92,.15); color:#ffbab2; }
  .home-card.ok .home-ic{ background:rgba(255,255,255,.06); color:var(--ink2); }
  .home-card .home-body{ flex:1; min-width:0; }
  .home-card .home-l{
    font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;
    font-weight:700; color:#a8e6a8;
  }
  .home-card.avoid .home-l{ color:#ffbab2; }
  .home-card.ok .home-l{ color:var(--faint); }
  .home-card .home-t{ font-size:15px; font-weight:700; margin-top:2px; color:var(--ink); }
  .home-card .home-r{ font-size:12px; color:var(--muted); margin-top:3px; line-height:1.35; }
  .home-card .home-time{ font-size:11px; color:var(--faint); margin-top:3px; }
  .home-card .chev{ color:var(--ink2); flex:none; }
  .home-section-hd{
    display:flex; justify-content:space-between; align-items:baseline;
    margin:18px 0 8px;
  }
  .home-section-hd h3{ margin:0; font-size:13px; font-weight:700; letter-spacing:-.01em; color:var(--ink); }
  .home-section-hd .more{ font-size:11.5px; color:var(--faint); cursor:pointer; }
  .home-extra.hidden{ display:none; }

  /* Tela do home day (renderHomeDay) */
  .home-hd{
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(135deg, rgba(168,230,168,.13), rgba(120,200,120,.04));
    border:1px solid rgba(168,230,168,.30);
    border-radius:var(--r-lg); padding:14px;
    margin-bottom:12px;
  }
  .home-hd .home-badge{
    flex:none; width:52px; height:52px; border-radius:16px;
    display:grid; place-items:center;
    font-size:11px; font-weight:800; letter-spacing:.08em; color:#a8e6a8;
    background:rgba(168,230,168,.20);
  }
  .home-hd .home-meta{ flex:1; }
  .home-hd .home-l{ font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; font-weight:700; color:#a8e6a8; }
  .home-hd .home-t{ font-size:17px; font-weight:700; margin-top:2px; }
  .home-hd .home-f{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .home-desc{
    background:var(--glass); border:1px solid var(--line-2);
    border-radius:var(--r-lg); padding:12px 14px;
    margin-bottom:12px; font-size:12.5px; color:var(--ink2); line-height:1.5;
  }
  .home-desc b{ color:#fff; }
  .home-skip{
    background:linear-gradient(135deg, rgba(91,158,255,.13), rgba(58,127,224,.04));
    border:1px solid rgba(91,158,255,.30);
    border-radius:var(--r-lg); padding:12px 14px;
    margin-bottom:14px;
  }
  .home-skip-hd{
    display:flex; align-items:center; gap:6px;
    font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
    color:#7ab2ff; margin-bottom:6px;
  }
  .home-skip-body{ font-size:13px; color:var(--ink); }
  .home-skip-body b{ color:#7ab2ff; }
  .home-skip-list{ margin:6px 0 4px; padding:0; list-style:none; }
  .home-skip-list li{ font-size:12.5px; color:var(--ink2); padding:2px 0; }
  .home-skip-foot{ font-size:11px; color:var(--faint); margin-top:6px; line-height:1.4; font-style:italic; }

  /* Banner "feito ontem em casa" no renderDay */
  .home-done-banner{
    background:linear-gradient(135deg, rgba(168,230,168,.18), rgba(120,200,120,.05));
    border:1px solid rgba(168,230,168,.35);
    border-radius:10px; padding:8px 12px;
    margin-top:8px;
    font-size:12px; color:#bce8bc; line-height:1.4;
  }
  .home-done-banner b{ color:#fff; }
</style>

// soma agregada do dia (proteína, carb, kcal)
function sumMacros(entries){
  let p=0,c=0,k=0;
  for(const e of entries||[]){ p+=+(e.p||0); c+=+(e.c||0); k+=+(e.k||0); }
  return {p,c,k};
}
// Normaliza string pra busca (remove acentos, lowercase)
function normTxt(s){ return String(s||"").toLowerCase().normalize('NFD').replace(/\p{Diacritic}/gu,''); }
function searchFoods(q){
  q=normTxt(q).trim(); if(!q) return [];
  const terms=q.split(/\s+/);
  return FOOD_DB.map((f,i)=>({f,i}))
    .filter(({f})=>{ const t=normTxt(f.n)+' '+normTxt(f.q); return terms.every(tm=>t.includes(tm)); })
    .slice(0,12);
}

let toastTimer=null;
function showToast(msg, type='info', ms=2500){
  const el=document.getElementById('toast');
  if(!el){ try{ console.log('[toast]', msg); }catch(e){} return; }
  el.textContent=msg;
  el.className='toast '+(type==='warn'?'warn':(type==='ok'?'ok':''));
  // force reflow pra animar de novo
  void el.offsetWidth;
  el.classList.remove('hidden');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.add('hidden'), ms);
}

}

/* ============ WORKOUT SESSION (start/pause/resume/end + duration) ============ */
function fmtDuration(ms){
  if(!ms || ms<0) ms=0;
  const sec=Math.floor(ms/1000);
  const h=Math.floor(sec/3600);
  const m=Math.floor((sec%3600)/60);
  const s=sec%60;
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${m}:${String(s).padStart(2,'0')}`;
}
function getSessionElapsed(){
  const s=ST.session && ST.session.active;
  if(!s) return 0;
  const now=Date.now();
  const totalMs=now-s.startAt;
  const pausedMs=(s.pausedTotal||0)+(s.pausedAt?now-s.pausedAt:0);
  return Math.max(0, totalMs-pausedMs);
}
function isSessionPaused(){
  return !!(ST.session && ST.session.active && ST.session.active.pausedAt);
}
function isSessionActive(){
  return !!(ST.session && ST.session.active);
}
function startSession(workoutId){
  if(ST.session.active){
    if(!confirm(`Já tem treino ${ST.session.active.workoutId} em progresso (${fmtDuration(getSessionElapsed())}). Substituir?`)) return false;
  }
  ST.session.active={workoutId, startAt:Date.now(), pausedAt:null, pausedTotal:0};
  saveK('session');
  updateSessionDisplays();
  updateFabMenu();
  showToast(`Treino ${workoutId} iniciado`, 'ok', 1800);
  return true;
}
function pauseSession(){
  const s=ST.session.active;
  if(!s || s.pausedAt) return;
  s.pausedAt=Date.now();
  saveK('session');
  updateSessionDisplays();
  updateFabMenu();
  showToast(`Treino pausado`, 'info', 1500);
}
function resumeSession(){
  const s=ST.session.active;
  if(!s || !s.pausedAt) return;
  s.pausedTotal=(s.pausedTotal||0)+(Date.now()-s.pausedAt);
  s.pausedAt=null;
  saveK('session');
  updateSessionDisplays();
  updateFabMenu();
  showToast(`Treino retomado`, 'ok', 1500);
}
function endSession(silent=false){
  const s=ST.session.active;
  if(!s) return null;
  const endAt=Date.now();
  const totalMs=endAt-s.startAt;
  const pausedMs=(s.pausedTotal||0)+(s.pausedAt?endAt-s.pausedAt:0);
  const activeMs=Math.max(0, totalMs-pausedMs);
  // Conta sets válidos do treino hoje
  const t=todayISO();
  let setsN=0, volume=0;
  const W=WK[s.workoutId];
  if(W){
    W.ex.forEach((e,i)=>{
      const id=exId(s.workoutId,i);
      const tod=todaySession(id);
      if(tod){
        tod.sets.forEach(set=>{
          if(isValidDone(set)){
            setsN++;
            volume += num(set.kg)*num(set.reps);
          }
        });
      }
    });
  }
  const record={date:t, workoutId:s.workoutId, startAt:s.startAt, endAt, durationMs:totalMs, activeMs, sets:setsN, volume:Math.round(volume)};
  ST.session.history.push(record);
  ST.session.active=null;
  saveK('session');
  updateSessionDisplays();
  updateFabMenu();
  if(!silent) showToast(`Treino encerrado · ${fmtDuration(activeMs)}`, 'ok', 2200);
  return record;
}
function manualStartSession(){
  // Determina qual treino: openDay (se tem treino aberto) > suggestedNextDay
  const wkId = (typeof openDay==='string' && openDay) ? openDay : suggestedNextDay();
  startSession(wkId);
}

}

/* ============ CELEBRATION (item 10) ============ */
function isWorkoutComplete(day){
  // Auto-trigger só em 100% dos sets planejados feitos (evita false positive)
  // Pra encerrar com volume parcial, usar FAB → Parar treino
  const W=WK[day]; if(!W) return false;
  let plannedTotal=0, doneTotal=0;
  W.ex.forEach((e,i)=>{
    plannedTotal += parseInt(e.s)||3;
    const tod=todaySession(exId(day,i));
    if(tod) doneTotal += tod.sets.filter(isValidDone).length;
  });
  return plannedTotal>0 && doneTotal>=plannedTotal;
}
function alreadyCelebratedToday(day){
  const t=todayISO();
  return ST.session.history.some(h=>h.date===t && h.workoutId===day);
}
function gatherWorkoutSummary(day){
  const t=todayISO();
  const W=WK[day];
  let setsN=0, volume=0, prs=[], topProgress=null;
  W.ex.forEach((e,i)=>{
    const id=exId(day,i);
    const tod=todaySession(id);
    if(!tod) return;
    tod.sets.forEach(set=>{
      if(isValidDone(set)){
        setsN++;
        volume += num(set.kg)*num(set.reps);
      }
    });
    if(isPRSession(id, tod.sets)){
      const e1=bestE1RM(tod.sets);
      prs.push({name:exName(e), e1:Math.round(e1*10)/10, kg:Math.max(...tod.sets.filter(s=>isValidDone(s)).map(s=>num(s.kg)))});
    }
    // Progressão simples vs sessão anterior
    if(!topProgress){
      const lastS=lastSession(id);
      if(lastS){
        const curE=bestE1RM(tod.sets);
        const lastE=bestE1RM(lastS.sets);
        if(curE>lastE && lastE>0){
          topProgress={name:exName(e), delta:Math.round((curE-lastE)*10)/10};
        }
      }
    }
  });
  return {setsN, volume:Math.round(volume), prs, topProgress};
}

/* ============ Phantom session cleanup (audit B fix) ============ */
function cleanupPhantomSessions(){
  const t=todayISO();
  let cleaned=0;
  for(const id in ST.logs){
    if(!Array.isArray(ST.logs[id])) continue;
    const before=ST.logs[id].length;
    // Mantém: sessões com pelo menos 1 set válido OU sessão de hoje (em progresso)
    ST.logs[id]=ST.logs[id].filter(sess => sess && sess.date===t || hasValidDoneSafe(sess && sess.sets));
    cleaned += before - ST.logs[id].length;
    if(!ST.logs[id].length) delete ST.logs[id];
  }
  if(cleaned>0){
    saveK('logs');
    console.log(`[boot] limpou ${cleaned} sessão(ões) fantasma`);
  }
}
function todayISO(){ return new Date().toISOString().slice(0,10); }
function hasValidDoneSafe(sets){
  if(!Array.isArray(sets)) return false;
  return sets.some(s => s && s.done && parseFloat(String(s.kg||'').replace(',','.'))>0 && parseFloat(String(s.reps||'').replace(',','.'))>0);

/* ============ Persistent storage + quota check ============ */
async function requestPersistentStorage(){
  try{
    if(navigator.storage && navigator.storage.persist){
      const already=await navigator.storage.persisted?.();
      if(!already){ await navigator.storage.persist(); }
    }
  }catch(e){}
}
async function checkStorageQuota(){
  try{
    if(navigator.storage && navigator.storage.estimate){
      const {usage=0, quota=0} = await navigator.storage.estimate();
      if(quota>0 && usage/quota > 0.80){
        showToast(`Storage ${Math.round(usage/quota*100)}% cheio — faça backup`, 'warn', 5000);
      }
    }
  }catch(e){}
}
function checkBackupReminder(){
  // Lembrete semanal de backup (C-1): nag se passou >7d desde o último export
  if(!ST.logs || !Object.keys(ST.logs).length) return; // sem dados, não nag
  const last=ST.meta && ST.meta.lastBackupAt;
  if(!last){
    // Nunca fez backup — só nag se já tem dados acumulados
    showToast(`Faça o 1º backup (Mais → Exportar)`, 'info', 4500);

  }
  const days=Math.floor((Date.now()-last)/86400000);
  if(days>=7){
    showToast(`Último backup há ${days} dias — exporta novo`, 'warn', 4500);
  }
}
function today(){ return new Date().toISOString().slice(0,10); }

function daysBetween(a,b){ const da=new Date(a+'T12:00:00'), db=new Date(b+'T12:00:00'); return Math.round((db-da)/86400000); }

/* ============ OVERRIDES DE EXERCÍCIO (edição do usuário, isolado em ST.exmeta) ============
   Ancorado pelo id ESTÁVEL do exercício (e.id no WK/HOME_SESSIONS), não pela posição.
   Assim reordenar/renomear no código não faz a edição migrar pro exercício errado.
   Git nunca vê isto (mora só no localStorage). Entra no backup via LS/exmeta. */
function exOverride(e){ return (e && e.id && ST.exmeta[e.id]) || {}; }
// Nome/cue exibidos = override do usuário se houver, senão o padrão do código.
function exName(e){ const o=exOverride(e); return (o.n!=null && o.n!=='') ? o.n : e.n; }
function exCue(e){ const o=exOverride(e); return (o.cue!=null && o.cue!=='') ? o.cue : e.cue; }
function exNote(e){ const o=exOverride(e); return (o.note!=null) ? o.note : ''; }
function exHasOverride(e){ const o=exOverride(e); return !!(o.n || o.cue || (o.note && o.note.trim())); }
function saveExMeta(id, patch){
  if(!id) return;
  const cur = ST.exmeta[id] || {};
  const next = {...cur, ...patch};
  // limpa campos vazios pra não inflar storage nem mascarar mudanças futuras do código
  for(const k of ['n','cue','note']){ if(next[k]==null || String(next[k]).trim()==='') delete next[k]; }
  if(Object.keys(next).length) ST.exmeta[id]=next; else delete ST.exmeta[id];
  saveK('exmeta');
}
function resetExMeta(id){ if(id && ST.exmeta[id]){ delete ST.exmeta[id]; saveK('exmeta'); } }
// Acha o exercício ORIGINAL (padrão do código) pelo id estável, varrendo WK + HOME_SESSIONS.
function exById(id){
  if(!id) return null;
  for(const d of Object.keys(WK)){ const f=WK[d].ex.find(x=>x.id===id); if(f) return f; }
  for(const t of Object.keys(HOME_SESSIONS)){ const f=HOME_SESSIONS[t].ex.find(x=>x.id===id); if(f) return f; }
  return null;
}

/* Ranqueia HOME_SESSIONS pelo próximo dia ABCD agendado.
   Retorna array ordenado [{id, tmpl, score, tier, reason}] onde tier ∈ "best"|"ok"|"avoid".
   tier "best" = complementa explicitamente; "avoid" = compete com foco; "ok" = neutro.
*/
function pickHomeSessions(nextDay){
  const out=[];
  for(const [id,tmpl] of Object.entries(HOME_SESSIONS)){
    let score=0; let tier="ok"; let reason="";
    if(tmpl.bestBefore && tmpl.bestBefore.includes(nextDay)){
      score+=30; tier="best"; reason=`Complementa o treino ${nextDay} de amanhã`;
    }
    if(tmpl.avoidBefore && tmpl.avoidBefore.includes(nextDay)){
      score-=50; tier="avoid"; reason=`Sobrepõe com o foco do treino ${nextDay} de amanhã`;
    }
    // Bonus se canSkipNextDay tem entrada pro próximo dia (mais palpável pro usuário)
    const skip=tmpl.canSkipNextDay && tmpl.canSkipNextDay[nextDay];
    if(skip && skip.length){
      score+=20;
      if(tier!=="avoid"){
        reason=reason || `Faz e pode pular ${skip.length} exercício${skip.length>1?'s':''} amanhã`;
      }
    }
    // Bonus se mg principal foca em prioridade (ombro_lat, peito_sup, biceps, triceps)
    for(const mg of Object.keys(tmpl.ex[0]?.mg||{})){
      if(MG_PRIORITY[mg]) score+=10;
    }
    // Core sempre tem +5 (sub-treinado em ABCD Push/Pull)
    if(id==="core_completo") score+=15;
    out.push({id, tmpl, score, tier, reason});
  }
  out.sort((a,b)=>b.score-a.score);
  return out;
}

/* ============ PROGRESSÃO: e1RM, PR, SUGESTÃO, PLATEAU ============ */
function num(v){ const n=parseFloat(String(v||"").replace(",",".")); return isFinite(n)?n:0; }
// Brzycki 1RM: kg / (1.0278 - 0.0278*reps), capped at reps 12 (acima degrada)
function e1RM(kg, reps){
  kg=num(kg); reps=num(reps);
  if(kg<=0||reps<=0) return 0;
  return kg / (1.0278 - 0.0278*Math.min(reps,12));
}
function bestE1RM(sets){
  if(!sets||!sets.length) return 0;
  return Math.max(0, ...sets.filter(s=>s&&num(s.kg)>0&&num(s.reps)>0).map(s=>e1RM(s.kg,s.reps)));
}
// PR detection: max e1RM histórico antes da sessão de hoje
function historicalBestE1RM(id, excludeToday=true){
  const h=ST.logs[id]||[]; const t=today();
  let best=0;
  for(const sess of h){
    if(excludeToday && sess.date===t) continue;
    const b=bestE1RM(sess.sets);
    if(b>best) best=b;
  }
  return best;
}
function isPRSession(id, sets){
  const cur=bestE1RM(sets);
  if(cur<=0) return false;
  const prev=historicalBestE1RM(id, true);
  if(prev<=0) return false; // primeira sessão de um exercício não conta como PR
  return cur > prev + 0.1;
}

// Parse range "8-12" → {min:8, max:12}
function parseRange(r){
  const m=String(r).match(/(\d+)\s*-\s*(\d+)/);
  if(m) return {min:+m[1], max:+m[2]};
  const n=parseInt(r); return n? {min:n,max:n} : {min:8,max:12};
}
// Sugestão baseada na última sessão: se TOP set bateu top range com mesma kg, sugere +incremento; senão +1 rep ou repete.
function suggestNext(id, e){
  const last=lastSession(id);
  if(!last) return null;
  const rng=parseRange(e.r);
  const done=last.sets.filter(s=>s&&s.done&&num(s.kg)>0&&num(s.reps)>0);
  if(!done.length) return null;
  const maxKg=Math.max(...done.map(s=>num(s.kg)));
  const topSets=done.filter(s=>num(s.kg)===maxKg);
  const minRepsTop = Math.min(...topSets.map(s=>num(s.reps)));
  const inc = e.t==='comp' ? (maxKg>=40?5:2.5) : (maxKg>=20?2.5:1);
  if(minRepsTop >= rng.max){
    return {kg:maxKg+inc, reps:rng.min, why:"bateu o topo · sobe carga"};
  }
  if(minRepsTop >= rng.min){
    return {kg:maxKg, reps:minRepsTop+1, why:"mesma carga · +1 rep"};
  }
  return {kg:maxKg, reps:rng.min, why:"foca em chegar no mínimo"};
}
// Plateau: 3 últimas sessões VÁLIDAS sem subir e1RM
function detectPlateau(id){
  const h=(ST.logs[id]||[]).filter(s=>bestE1RM(s.sets)>0);
  if(h.length<3) return false;
  const last3=h.slice(-3).map(s=>bestE1RM(s.sets));
  return last3[2] <= last3[0] && last3[2] <= last3[1];
}
// Quantas semanas o usuário tem treinado esse exercício específico
function weeksOnExercise(id){
  const h=(ST.logs[id]||[]).filter(s=>hasValidDone(s.sets));
  if(!h.length) return 0;
  return Math.floor(daysBetween(h[0].date, today())/7)+1;
}
// Plateau persistente APÓS deload (segundo Schoenfeld, Helms: só trocar se deload feito não destravou)
function shouldSwapExercise(id){
  if(!detectPlateau(id)) return null;
  const lastDeload = ST.meta.lastDeloadWeek||0;
  const exerciseWeeks = weeksOnExercise(id);
  // Só sugere troca se houve deload depois do início desse exercício
  // (proxy: lastDeload > 0 e usuário já está há >=6 semanas no exercício)
  if(lastDeload>0 && exerciseWeeks>=6) return "plateau-pos-deload";
  // Ou se exercício passou de 12 semanas (variar pra ganhar hipertrofia regional)
  if(exerciseWeeks>=12) return "tempo-longo";
  return null;
}
